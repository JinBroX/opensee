<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenSee</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --deep:#0a0f18;--mist:rgba(200,205,215,0.75);--mist-dim:rgba(200,205,215,0.45);
      --mist-faint:rgba(200,205,215,0.22);--gold:rgba(200,170,120,0.65);
      --gold-dim:rgba(200,170,120,0.3);--font:'PingFang SC','Noto Sans SC','Microsoft YaHei',serif;
    }
    html{width:100%;min-height:100%;background:var(--deep);font-family:var(--font);color:var(--mist);-webkit-font-smoothing:antialiased}
    body{width:100%;min-height:100vh}
    .bg{position:fixed;inset:0;z-index:0}
    .bg img{width:100%;height:100vh;object-fit:cover;object-position:center;filter:saturate(0.6) brightness(0.35);position:sticky;top:0}
    .bg::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 50%,rgba(10,15,24,0.3) 0%,rgba(4,8,14,0.85) 100%)}
    .content{position:relative;z-index:2;max-width:460px;margin:0 auto;padding:80px 24px 80px}
    .lead{font-size:1.05rem;line-height:1.8;color:var(--mist);font-weight:300;letter-spacing:0.04em;margin-bottom:40px}
    .para{font-size:0.88rem;line-height:1.9;color:var(--mist-dim);font-weight:300;letter-spacing:0.04em;margin-bottom:24px}
    @media(max-width:640px){.content{padding:60px 20px 70px}.lead{font-size:0.95rem}.para{font-size:0.82rem}}
  </style>
</head>
<body>
<div class="bg"><img src="opensee-1.jpg" alt="" /></div>
<div class="content" id="content"></div>

<script type="module">
  async function init() {
    const resp = await fetch('data/hexagrams/Q7/semantic-v1.json');
    const data = await resp.json();
    const summary = data.summary || '';
    const segments = data.main?.segments || {};
    const lines = data.main?.lines || [];
    const closing = data.closing || '';

    let html = `<div class="lead">${summary}</div>`;
    const texts = [];
    if (segments.status) texts.push(segments.status);
    if (segments.mind) texts.push(segments.mind);
    if (segments.trend) texts.push(segments.trend);
    if (segments.risk) texts.push(segments.risk);

    // 2 changing lines at 2 and 4
    const YAOS = [7, 9, 8, 6, 8, 8];
    YAOS.forEach((v,i) => { if((v===6||v===9) && lines[i]?.text) texts.push(lines[i].text); });
    if (closing) texts.push(closing);

    for (const t of texts) html += `<div class="para">${t}</div>`;
    document.getElementById('content').innerHTML = html;
  }
  init();
</script>
</body>
</html>
