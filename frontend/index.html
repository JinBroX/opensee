<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenSee</title>
  <link rel="icon" href="/assets/ico.png" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0a0806;
      --ink: #e8e4dc;
      --ink-light: rgba(255,255,255,0.55);
      --accent: #d8b07a;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      width: 100vw;
      height: 100vh;
      background:
        url('/assets/opensee-hero.jpg') center / cover no-repeat;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      overflow: hidden;
      cursor: pointer;
      user-select: none;
      position: relative;
    }

    /* 暗色遮罩，保证可读性 */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.45);
      pointer-events: none;
      z-index: 0;
    }

    /* Logo */
    .logo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Cormorant Garamond', 'Times New Roman', serif;
      font-size: clamp(2.5rem, 7vw, 4rem);
      font-weight: 300;
      letter-spacing: 0.04em;
      color: rgba(255,255,255,0.2);
      pointer-events: none;
      z-index: 1;
    }

    /* 呼吸圆层 */
    .aura-layer {
      position: absolute;
      inset: 0;
      overflow: hidden;
      z-index: 1;
    }

    .aura {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      will-change: transform, opacity;
    }

    /* 涟漪 */
    .ripple {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      animation: rippleOut 0.9s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
      z-index: 10;
    }

    @keyframes rippleOut {
      0%   { transform: translate(-50%,-50%) scale(0); opacity: 0.7; }
      100% { transform: translate(-50%,-50%) scale(5); opacity: 0; }
    }

    /* Logo文字提示 - 极简 */
    .hint {
      position: absolute;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 0.25em;
      color: var(--ink-light);
      pointer-events: none;
      z-index: 10;
    }

    /* 移动端 */
    @media (max-width: 768px) {
      .logo { font-size: clamp(2rem, 9vw, 3rem); }
      .hint { bottom: 28px; font-size: 11px; }
    }
  </style>
</head>
<body>

  <div class="logo">OpenSee.me</div>

  <div class="aura-layer" id="auraLayer"></div>

  <div class="hint">任意位置触碰感应</div>

  <script>
    // ---------- 基础信息 ----------
    let uid = localStorage.getItem('zen_uid');
    if (!uid) {
      uid = 'zen_' + Math.random().toString(36).slice(2, 10);
      localStorage.setItem('zen_uid', uid);
    }

    // ---------- 设计配置 ----------
    const CFG = {
      auraCount:     window.innerWidth < 768 ? 9 : 13,
      trailMaxLen:   10,
      trailWindow:   200,   // ms
      breatheMin:    5,     // s
      breatheRange:  4,     // s
      rippleDuration: 900,
    };

    // 色调盘：暖灰底 + 金/褐系 aura
    // 主背景偏暖，外圈 aura 更偏冷灰，制造层次
    const AURA_COLORS = [
      'rgba(185,165,130, 0.22)',  // 暖金
      'rgba(160,150,140, 0.18)',  // 灰褐
      'rgba(140,155,170, 0.16)',  // 蓝灰
      'rgba(175,158,130, 0.20)',  // 琥珀
      'rgba(150,145,138, 0.15)',  // 浅灰
      'rgba(180,168,140, 0.19)',  // 淡金
      'rgba(135,148,162, 0.14)',  // 青灰
      'rgba(165,148,122, 0.17)',  // 土金
    ];

    // ---------- 鼠标轨迹 ----------
    let mouseTrail = [];

    function recordMove(e) {
      const now = Date.now();
      const x = e.touches ? e.touches[0].clientX : e.clientX;
      const y = e.touches ? e.touches[0].clientY : e.clientY;
      mouseTrail.push({ x, y, t: now });
      const cutoff = now - CFG.trailWindow;
      mouseTrail = mouseTrail.filter(p => p.t >= cutoff).slice(-CFG.trailMaxLen);
    }

    // ---------- 涟漪 ----------
    function ripple(x, y) {
      const el = document.createElement('div');
      el.className = 'ripple';
      // 随机选一个 aura 色
      const c = AURA_COLORS[Math.floor(Math.random() * AURA_COLORS.length)];
      el.style.cssText = `
        left: ${x}px; top: ${y}px;
        width: 80px; height: 80px;
        background: ${c.replace('0.', '0.')};
        border: 1px solid ${c};
      `;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), CFG.rippleDuration);
    }

    // ---------- 取卦 ----------
    function onTouch(e) {
      e.preventDefault();
      const x = Math.round(e.clientX || e.touches?.[0]?.clientX || 0);
      const y = Math.round(e.clientY || e.touches?.[0]?.clientY || 0);
      const ts = Date.now();
      const seed = `${ts}|${x},${y}|${uid}|${JSON.stringify(mouseTrail)}`;
      ripple(x, y);
      setTimeout(() => location.href = `content.html?seed=${encodeURIComponent(seed)}`, 350);
    }

    // ---------- Aura 呼吸圆 ----------
    class Aura {
      constructor(layer) {
        this.layer = layer;
        const W = window.innerWidth;
        const H = window.innerHeight;
        const minD = Math.min(W, H);

        // 尺寸：覆盖大小差异大一些，避免视觉单调
        this.w = minD * (0.25 + Math.random() * 0.45);
        this.h = this.w * (0.8 + Math.random() * 0.4); // 略扁，制造自然感

        // 位置：覆盖全屏，包括 logo 区域周围
        this.x = Math.random() * (W - this.w);
        this.y = Math.random() * (H - this.h);

        this.colorIdx = Math.floor(Math.random() * AURA_COLORS.length);
        this.phase   = Math.random() * Math.PI * 2;
        this.speed   = 0.18 + Math.random() * 0.14;
        this.breathe = CFG.breatheMin + Math.random() * CFG.breatheRange;

        this.makeEl();
        this.update();
      }

      makeEl() {
        this.el = document.createElement('div');
        this.el.className = 'aura';
        this.el.style.cssText = `
          width: ${this.w}px;
          height: ${this.h}px;
          background: ${AURA_COLORS[this.colorIdx]};
          filter: blur(1px);
        `;
        this.layer.appendChild(this.el);
      }

      update() {
        const t = Date.now() * 0.001;
        const cycle = (t * this.speed + this.phase) % (this.breathe * 2);

        // 呼吸：透明度 0.05↔0.3，x/y 微浮动
        const breathRatio = cycle < this.breathe
          ? cycle / this.breathe
          : 2 - cycle / this.breathe;

        const opacity = 0.05 + breathRatio * 0.25;
        const dx = Math.sin(t * 0.6 + this.phase) * 12;
        const dy = Math.cos(t * 0.5 + this.phase * 1.3) * 8;

        this.el.style.opacity = opacity;
        this.el.style.left = (this.x + dx) + 'px';
        this.el.style.top  = (this.y + dy) + 'px';
        this.el.style.transform = `scale(${0.9 + breathRatio * 0.2})`;

        requestAnimationFrame(() => this.update());
      }

      destroy() { this.el?.remove(); }
    }

    // ---------- 主程序 ----------
    let auras = [];

    function init() {
      const layer = document.getElementById('auraLayer');
      auras.forEach(a => a.destroy());
      auras = [];
      for (let i = 0; i < CFG.auraCount; i++) {
        auras.push(new Aura(layer));
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      init();
      document.addEventListener('mousemove', recordMove, { passive: true });
      document.addEventListener('touchmove', recordMove, { passive: true });
      document.addEventListener('click',      onTouch);
      document.addEventListener('touchend',   onTouch, { passive: true });
    });

    window.addEventListener('resize', () => setTimeout(init, 300));

    document.addEventListener('keydown', e => {
      if (e.key.toLowerCase() === 'r') init();
    });
  </script>

</body>
</html>
