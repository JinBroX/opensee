<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenSee · 心流句场</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@200;300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f5f0ea;
      --ink:      #2c2824;
      --ink-soft: #7a7270;
      --ink-faint:#b0a8a4;
      --accent:   #b8a07a;
      --accent-light: #d4c8b8;
      --hero-overlay: rgba(245, 240, 234, 0.55);
      --font:     'Noto Sans SC', 'PingFang SC', 'Helvetica Neue', 'Microsoft YaHei', sans-serif;
    }

    html { height: 100%; }

    body {
      min-height: 100%;
      background: var(--bg);
      font-family: var(--font);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow: hidden;
    }

    /* ─── Hero ─── */
    .hero {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .hero-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 30%;
      filter: saturate(0.85) brightness(1.08);
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(245, 240, 234, 0.3) 0%,
        rgba(245, 240, 234, 0.6) 40%,
        rgba(245, 240, 234, 0.85) 70%,
        var(--bg) 100%
      );
    }

    /* ─── Brand ─── */
    .brand {
      position: fixed;
      top: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      text-align: center;
      pointer-events: none;
      user-select: none;
    }

    .brand-name {
      font-size: 0.65rem;
      letter-spacing: 0.5em;
      color: var(--ink-faint);
      font-weight: 300;
      text-transform: uppercase;
    }

    .brand-tag {
      font-size: 0.55rem;
      letter-spacing: 0.3em;
      color: var(--ink-faint);
      font-weight: 200;
      margin-top: 4px;
      opacity: 0.6;
    }

    /* ─── Flow Container ─── */
    .flow-wrap {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 32px 80px;
      pointer-events: none;
    }

    .flow-viewport {
      width: 100%;
      max-width: 520px;
      height: 100%;
      max-height: 420px;
      position: relative;
      overflow: hidden;
      mask-image: linear-gradient(
        to bottom,
        transparent 0%,
        rgba(0,0,0,0.15) 12%,
        rgba(0,0,0,1) 30%,
        rgba(0,0,0,1) 70%,
        rgba(0,0,0,0.15) 88%,
        transparent 100%
      );
      -webkit-mask-image: linear-gradient(
        to bottom,
        transparent 0%,
        rgba(0,0,0,0.15) 12%,
        rgba(0,0,0,1) 30%,
        rgba(0,0,0,1) 70%,
        rgba(0,0,0,0.15) 88%,
        transparent 100%
      );
    }

    .flow-track {
      position: absolute;
      left: 0;
      width: 100%;
      will-change: transform;
      transition: transform 0.9s cubic-bezier(0.22, 0.61, 0.36, 1);
    }

    .flow-item {
      width: 100%;
      padding: 14px 0;
      text-align: center;
      font-size: 1.05rem;
      font-weight: 300;
      line-height: 1.7;
      color: var(--ink-soft);
      letter-spacing: 0.04em;
      cursor: pointer;
      pointer-events: auto;
      transition: all 0.6s cubic-bezier(0.22, 0.61, 0.36, 1);
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      position: relative;
    }

    .flow-item.is-center {
      color: var(--ink);
      font-size: 1.3rem;
      font-weight: 400;
      text-shadow: 0 1px 12px rgba(180, 160, 130, 0.12);
    }

    .flow-item.is-near {
      font-size: 1.0rem;
      color: var(--ink-soft);
    }

    .flow-item.is-far {
      font-size: 0.85rem;
      color: var(--ink-faint);
    }

    .flow-item:hover {
      color: var(--accent);
    }

    .flow-item:active {
      transform: scale(0.97);
    }

    /* ─── Ripple ─── */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(184,160,122,0.25) 0%, transparent 60%);
      transform: scale(0);
      animation: rippleAnim 0.7s ease-out forwards;
      pointer-events: none;
    }

    @keyframes rippleAnim {
      to { transform: scale(5); opacity: 0; }
    }

    /* ─── Seed Flash ─── */
    .seed-flash {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.9);
      z-index: 100;
      background: rgba(255, 252, 248, 0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 18px 32px;
      border-radius: 12px;
      border: 1px solid rgba(184, 160, 122, 0.15);
      box-shadow: 0 8px 32px rgba(140, 120, 100, 0.1);
      font-size: 0.8rem;
      color: var(--ink-soft);
      pointer-events: none;
      opacity: 0;
      transition: all 0.5s cubic-bezier(0.22, 0.61, 0.36, 1);
      text-align: center;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .seed-flash.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .seed-flash .seed-icon {
      display: inline-block;
      margin-right: 8px;
      font-size: 1rem;
    }

    /* ─── Scroll hint ─── */
    .scroll-hint {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      pointer-events: none;
      user-select: none;
      opacity: 0.4;
      animation: hintFade 3s ease-in-out infinite;
    }

    .scroll-hint-line {
      width: 1px;
      height: 24px;
      background: var(--ink-faint);
      animation: hintScroll 2s ease-in-out infinite;
    }

    .scroll-hint-text {
      font-size: 0.55rem;
      letter-spacing: 0.3em;
      color: var(--ink-faint);
      font-weight: 200;
    }

    @keyframes hintFade {
      0%, 100% { opacity: 0.25; }
      50% { opacity: 0.5; }
    }

    @keyframes hintScroll {
      0%, 100% { transform: translateY(0); opacity: 0.3; }
      50% { transform: translateY(6px); opacity: 1; }
    }

    /* ─── Bottom gradient ─── */
    .bottom-fade {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 80px;
      background: linear-gradient(to top, var(--bg) 0%, transparent 100%);
      z-index: 5;
      pointer-events: none;
    }

    /* ─── Responsive ─── */
    @media (max-width: 520px) {
      .flow-viewport { max-height: 320px; }
      .flow-item { font-size: 0.95rem; padding: 12px 0; }
      .flow-item.is-center { font-size: 1.15rem; }
      .flow-item.is-near { font-size: 0.9rem; }
      .flow-item.is-far { font-size: 0.8rem; }
      .flow-wrap { padding: 80px 20px 60px; }
      .brand { top: 24px; }
      .brand-name { font-size: 0.55rem; }
    }
  </style>
</head>
<body>

  <div class="hero">
    <img
      class="hero-img"
      src="https://coresg-normal.trae.ai/api/ide/v1/text_to_image?prompt=soft%20morning%20light%20through%20translucent%20curtains%2C%20warm%20beige%20and%20cream%20tones%2C%20gentle%20breeze%20stirring%20light%20fabric%2C%20pale%20clay%20vase%20with%20dried%20grasses%20on%20a%20simple%20wooden%20table%2C%20atmospheric%20and%20calm%2C%20photorealistic%2C%20soft%20shadows%2C%20peaceful%20still%20life%2C%20fine%20art%20photography%2C%20cinematic%20lighting&image_size=landscape_16_9"
      alt=""
    />
    <div class="hero-overlay"></div>
  </div>

  <div class="brand">
    <div class="brand-name">OpenSee</div>
    <div class="brand-tag">心流句场</div>
  </div>

  <div class="bottom-fade"></div>

  <div class="seed-flash" id="seedFlash">
    <span class="seed-icon">⟡</span>
    <span id="seedFlashText">Seed 已生成</span>
  </div>

  <div class="scroll-hint">
    <div class="scroll-hint-line"></div>
    <div class="scroll-hint-text">滑动浏览</div>
  </div>

  <div class="flow-wrap">
    <div class="flow-viewport" id="viewport">
      <div class="flow-track" id="track"></div>
    </div>
  </div>

  <script>
    const VIEWPORT = document.getElementById('viewport');
    const TRACK = document.getElementById('track');
    const FLASH = document.getElementById('seedFlash');
    const FLASH_TEXT = document.getElementById('seedFlashText');

    let ALL_ITEMS = [];
    let currentIndex = 0;
    let itemHeight = 0;
    let isAnimating = false;
    let autoTimer = null;
    let touchStartY = 0;
    let isTouching = false;
    let flashTimer = null;

    /* ─── 加载数据 ─── */
    async function loadPool() {
      try {
        const resp = await fetch('/states/core/s1_pool.json');
        if (!resp.ok) throw new Error('s1_pool.json 加载失败');
        const data = await resp.json();
        if (data && Array.isArray(data.pool)) {
          const seen = new Set();
          for (const item of data.pool) {
            if (!seen.has(item.text)) {
              seen.add(item.text);
              ALL_ITEMS.push(item);
            }
          }
        }
      } catch (err) {
        console.warn(err.message + '，尝试逐卦加载');
        await loadFromHexagrams();
      }
    }

    async function loadFromHexagrams() {
      const ids = Array.from({ length: 64 }, (_, i) => 'Q' + (i + 1));
      const results = await Promise.all(ids.map(async (id) => {
        try {
          const resp = await fetch(`data/hexagrams/${id}/s2.json`);
          if (!resp.ok) return null;
          const data = await resp.json();
          if (data && Array.isArray(data.s2)) return data.s2.map(t => ({ text: t, hex: id }));
          return null;
        } catch { return null; }
      }));
      const seen = new Set();
      for (const arr of results) {
        if (!arr) continue;
        for (const item of arr) {
          if (!seen.has(item.text)) {
            seen.add(item.text);
            ALL_ITEMS.push(item);
          }
        }
      }
    }

    /* ─── 构建轮播 ─── */
    function buildTrack() {
      if (ALL_ITEMS.length === 0) return;
      // 三倍循环: [..., last, first, second, ..., last, first, ...]
      const total = ALL_ITEMS.length;

      TRACK.innerHTML = '';

      // 末尾 3 条（前导）
      for (let i = total - 3; i < total; i++) {
        const el = createItem(ALL_ITEMS[i]);
        TRACK.appendChild(el);
      }
      // 全部（主体）
      for (let i = 0; i < total; i++) {
        const el = createItem(ALL_ITEMS[i]);
        TRACK.appendChild(el);
      }
      // 开头 3 条（后续）
      for (let i = 0; i < 3; i++) {
        const el = createItem(ALL_ITEMS[i]);
        TRACK.appendChild(el);
      }

      // 初始定位到主体第一项
      currentIndex = 3;
      updatePositions(false);

      startAuto();
    }

    function createItem(data) {
      const el = document.createElement('div');
      el.className = 'flow-item';
      el.textContent = data.text;
      el.dataset.hex = data.hex || '';
      el.addEventListener('click', function (e) {
        generateSeed(data.text, this.dataset.hex, this, e);
      });
      return el;
    }

    function getItemHeight() {
      const first = TRACK.querySelector('.flow-item');
      if (!first) return 56;
      const h = first.getBoundingClientRect().height;
      const style = getComputedStyle(first);
      const padding = parseFloat(style.paddingTop) + parseFloat(style.paddingBottom);
      return h;
    }

    function updatePositions(animate = true) {
      if (!animate) {
        TRACK.style.transition = 'none';
      } else {
        TRACK.style.transition = 'transform 0.9s cubic-bezier(0.22, 0.61, 0.36, 1)';
      }

      const items = TRACK.querySelectorAll('.flow-item');
      const centerIdx = 3; // 居中位置索引（在可见窗口内）

      const total = ALL_ITEMS.length;
      const centerGlobal = currentIndex;

      items.forEach((el, idx) => {
        el.classList.remove('is-center', 'is-near', 'is-far');
        const dist = idx - centerGlobal;
        const abs = Math.abs(dist);
        if (abs === 0) el.classList.add('is-center');
        else if (abs <= 1) el.classList.add('is-near');
        else el.classList.add('is-far');
      });

      // 计算偏移：让 centerGlobal 对应的 item 居中
      // 每个 item 高度 = itemHeight，间隔为 padding
      const offset = -centerGlobal * itemHeight;
      TRACK.style.transform = `translateY(${offset}px)`;

      // 检测是否需要跳转（无缝循环）
      if (!animate) {
        void TRACK.offsetHeight;
        TRACK.style.transition = 'transform 0.9s cubic-bezier(0.22, 0.61, 0.36, 1)';
      }
    }

    function snapTo(index, animate = true) {
      if (isAnimating) return;
      isAnimating = true;

      const total = ALL_ITEMS.length;
      currentIndex = index;
      updatePositions(animate);

      // 无缝循环跳转
      if (currentIndex < 3) {
        setTimeout(() => {
          TRACK.style.transition = 'none';
          currentIndex += total;
          const offset = -currentIndex * itemHeight;
          TRACK.style.transform = `translateY(${offset}px)`;
          void TRACK.offsetHeight;
          TRACK.style.transition = 'transform 0.9s cubic-bezier(0.22, 0.61, 0.36, 1)';
          isAnimating = false;
        }, 950);
      } else if (currentIndex >= 3 + total) {
        setTimeout(() => {
          TRACK.style.transition = 'none';
          currentIndex -= total;
          const offset = -currentIndex * itemHeight;
          TRACK.style.transform = `translateY(${offset}px)`;
          void TRACK.offsetHeight;
          TRACK.style.transition = 'transform 0.9s cubic-bezier(0.22, 0.61, 0.36, 1)';
          isAnimating = false;
        }, 950);
      } else {
        setTimeout(() => { isAnimating = false; }, 950);
      }
    }

    function next() {
      snapTo(currentIndex + 1);
    }

    function prev() {
      snapTo(currentIndex - 1);
    }

    let autoTimerRef = null;

    function startAuto() {
      stopAuto();
      autoTimerRef = setInterval(() => {
        next();
      }, 3200);
    }

    function stopAuto() {
      if (autoTimerRef) {
        clearInterval(autoTimerRef);
        autoTimerRef = null;
      }
    }

    /* ─── Seed ─── */
    function generateSeed(text, hex, el, e) {
      const rect = el.getBoundingClientRect();
      const x = (e.clientX || rect.left + rect.width / 2) - rect.left;
      const y = (e.clientY || rect.top + rect.height / 2) - rect.top;

      const ripple = document.createElement('span');
      ripple.className = 'ripple';
      ripple.style.left = x + 'px';
      ripple.style.top = y + 'px';
      ripple.style.width = '20px';
      ripple.style.height = '20px';
      ripple.style.marginLeft = '-10px';
      ripple.style.marginTop = '-10px';
      el.appendChild(ripple);
      setTimeout(() => ripple.remove(), 700);

      showFlash(text, hex);
    }

    function showFlash(text, hex) {
      if (flashTimer) {
        clearTimeout(flashTimer);
        FLASH.classList.remove('show');
      }
      FLASH_TEXT.textContent = '⟡ Seed 已生成';
      if (hex) FLASH_TEXT.textContent += ' · ' + hex;
      FLASH.classList.add('show');
      flashTimer = setTimeout(() => {
        FLASH.classList.remove('show');
        flashTimer = null;
      }, 1400);
    }

    /* ─── Touch / Wheel ─── */
    VIEWPORT.addEventListener('wheel', (e) => {
      e.preventDefault();
      if (isAnimating) return;
      if (e.deltaY > 0) next();
      else prev();
      resetAuto();
    }, { passive: false });

    VIEWPORT.addEventListener('touchstart', (e) => {
      touchStartY = e.touches[0].clientY;
      isTouching = true;
      stopAuto();
    }, { passive: true });

    VIEWPORT.addEventListener('touchend', (e) => {
      if (!isTouching) return;
      isTouching = false;
      const diff = touchStartY - e.changedTouches[0].clientY;
      if (Math.abs(diff) > 20) {
        if (diff > 0) next();
        else prev();
      }
      resetAuto();
    }, { passive: true });

    function resetAuto() {
      stopAuto();
      if (!document.hidden) startAuto();
    }

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) stopAuto();
      else startAuto();
    });

    /* ─── Init ─── */
    (async function init() {
      await loadPool();
      if (ALL_ITEMS.length === 0) {
        ALL_ITEMS = [
          { text: '桌面上的东西还没有完全整理完', hex: '' },
          { text: '一些事情处在半完成的状态', hex: '' },
          { text: '某个动作做了一半就停住了', hex: '' },
          { text: '日常的节奏出现轻微断点', hex: '' },
          { text: '你泡了一杯茶，看它慢慢凉', hex: '' },
          { text: '有一句话在喉咙里转了转又回去了', hex: '' },
          { text: '窗外的天光正在一点一点暗下来', hex: '' },
          { text: '你翻到一本书的中间停下', hex: '' },
          { text: '有些东西已经在变好，只是还很慢', hex: '' },
          { text: '你发现自己最近不太想说话了', hex: '' },
        ];
      }

      buildTrack();

      requestAnimationFrame(() => {
        itemHeight = getItemHeight();
        updatePositions(false);
      });
    })();
  </script>
</body>
</html>
