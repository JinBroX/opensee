<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Q24 复卦 · OpenSee</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --deep:#0a0f18;--mist:rgba(200,205,215,0.75);--mist-dim:rgba(200,205,215,0.45);
      --mist-faint:rgba(200,205,215,0.22);--gold:rgba(200,170,120,0.65);
      --gold-dim:rgba(200,170,120,0.3);--gold-faint:rgba(200,170,120,0.1);
      --font:'PingFang SC','Noto Sans SC','Microsoft YaHei',serif;
    }
    html{width:100%;min-height:100%;background:var(--deep);font-family:var(--font);color:var(--mist);-webkit-font-smoothing:antialiased}
    body{width:100%;min-height:100vh}

    .bg{position:fixed;inset:0;z-index:0}
    .bg img{width:100%;height:100vh;object-fit:cover;object-position:center;filter:saturate(0.6) brightness(0.35);position:sticky;top:0}
    .bg::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 50%,rgba(10,15,24,0.3) 0%,rgba(4,8,14,0.85) 100%)}

    .algo{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:5;display:flex;gap:5px;align-items:center}
    .algo-yao{width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:0.48rem;border-radius:50%;font-weight:300}
    .algo-yao.c{background:var(--gold-faint);color:var(--gold);box-shadow:0 0 8px var(--gold-faint)}
    .algo-yao.s{background:rgba(255,255,255,0.03);color:var(--mist-faint)}
    .algo-label{font-size:0.42rem;color:var(--mist-faint);margin-left:6px;letter-spacing:0.1em}

    .close-btn{position:fixed;top:20px;right:20px;z-index:5;padding:6px 18px;font-family:var(--font);font-size:0.5rem;letter-spacing:0.15em;color:var(--mist-faint);background:rgba(255,255,255,0.03);border:1px solid rgba(200,170,120,0.1);border-radius:100px;cursor:pointer;transition:all 0.4s}
    .close-btn:hover{color:var(--mist-dim);border-color:var(--gold-faint)}

    .content{position:relative;z-index:2;max-width:460px;margin:0 auto;padding:100px 24px 80px}

    .section{margin-bottom:36px}
    .section-label{font-size:0.5rem;letter-spacing:0.35em;color:var(--gold-dim);font-weight:300;margin-bottom:10px}
    .section-text{font-size:0.88rem;line-height:1.85;color:var(--mist-dim);font-weight:300;letter-spacing:0.04em}
    .section-text.italic{font-style:italic}
    .section-text.lead{font-size:1.05rem;color:var(--mist);font-weight:300}
    .section-divider{width:28px;height:1px;background:var(--gold-faint);margin:32px 0}

    @media(max-width:640px){
      .content{padding:90px 20px 70px}
      .section-text{font-size:0.82rem}
    }
  </style>
</head>
<body>

<div class="bg"><img src="opensee-1.jpg" alt="" /></div>
<div class="algo" id="algo"></div>
<button class="close-btn" onclick="history.back()">← 返回</button>

<div class="content" id="content"></div>

<script type="module">
  const YAOS = [8, 7, 6, 7, 9, 7];
  const changing = [];
  YAOS.forEach((v, i) => { if (v === 6 || v === 9) changing.push(i); });

  let algoHTML = '';
  for (let i = YAOS.length - 1; i >= 0; i--) {
    const cls = YAOS[i] === 6 || YAOS[i] === 9 ? 'c' : 's';
    algoHTML += `<div class="algo-yao ${cls}">${YAOS[i]}</div>`;
  }
  algoHTML += `<span class="algo-label">变爻 ${changing.map(i => i + 1).join('·')}</span>`;
  document.getElementById('algo').innerHTML = algoHTML;

  async function init() {
    const resp = await fetch('data/hexagrams/Q24/semantic-v1.json');
    const data = await resp.json();
    const summary = data.summary || '';
    const segments = data.main?.segments || {};
    const lines = data.main?.lines || [];
    const closing = data.closing || '';

    let html = '';

    // 气韵
    if (summary) {
      html += `<div class="section"><div class="section-label">气韵</div><div class="section-text lead">${summary}</div></div>`;
      html += `<div class="section-divider"></div>`;
    }

    // 四象
    const segMap = [
      { key: 'status', label: '映照' }, { key: 'mind', label: '心境' },
      { key: 'trend', label: '流向' }, { key: 'risk', label: '留意' },
    ];
    for (const s of segMap) {
      if (segments[s.key] && !segments[s.key].includes('缺失')) {
        html += `<div class="section"><div class="section-label">${s.label}</div><div class="section-text">${segments[s.key]}</div></div>`;
      }
    }

    // 触处
    if (changing.length >= 1 && changing.length <= 2) {
      html += `<div class="section-divider"></div>`;
      for (const i of changing) {
        const text = lines[i]?.text || '';
        if (text) html += `<div class="section"><div class="section-label">触处</div><div class="section-text">${text}</div></div>`;
      }
    }

    // 余响
    if (closing) {
      html += `<div class="section-divider"></div>`;
      html += `<div class="section"><div class="section-label">余响</div><div class="section-text italic">${closing}</div></div>`;
    }

    document.getElementById('content').innerHTML = html;
  }

  init();
</script>
</body>
</html>
