<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>具体事项 - yi-on v2</title>
  <link rel="icon" href="ico.png" type="image/x-icon">
  <style>
    :root {
      --bg: #f7f5f2;
      --ink: #2c2c2c;
      --ink-mid: #5a5a5a;
      --ink-light: #999;
      --accent: #c9a96e;
      --accent-d: #a8854a;
      --card-bg: rgba(255,253,250,0.85);
      --border: rgba(0,0,0,0.07);
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'Helvetica Neue', Arial, -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--ink);
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 15% 15%, rgba(201,169,110,0.07) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 85%, rgba(150,145,138,0.08) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    /* === 整体布局：全屏 flex column === */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      width: 100%;
      max-width: 100%;
      margin: 0 auto;
      position: relative;
      z-index: 1;
      overflow: hidden;
    }

    /* === 顶部导航 === */
    .nav-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 1px solid rgba(0,0,0,0.06);
      background: rgba(247,245,242,0.96);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      flex-shrink: 0;
      z-index: 10;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--ink-light);
      font-size: 0.85rem;
      font-weight: 300;
      cursor: pointer;
      border: none;
      background: none;
      font-family: inherit;
      padding: 6px 0;
      transition: color .2s;
      white-space: nowrap;
    }
    .back-btn:hover { color: var(--ink); }
    .back-btn:active { opacity: 0.6; }

    .hex-name {
      font-size: 0.92rem;
      font-weight: 300;
      color: var(--accent);
      letter-spacing: 0.1em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 160px;
    }

    .user-bar {
      display: flex;
      align-items: center;
      text-decoration: none;
      cursor: pointer;
      flex-shrink: 0;
      margin-left: 8px;
    }
    .user-avatar-sm {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; color: #fff; font-weight: 500;
      transition: transform 0.18s, box-shadow 0.18s;
    }
    .user-bar:active .user-avatar-sm {
      transform: scale(0.95);
    }

    /* === 状态栏 === */
    .status-bar {
      padding: 4px 16px;
      background: rgba(0,0,0,0.018);
      font-size: 0.72rem;
      color: var(--ink-light);
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid rgba(0,0,0,0.04);
      flex-shrink: 0;
    }
    .tier-badge {
      padding: 2px 9px;
      border-radius: 100px;
      font-size: 0.7rem;
      flex-shrink: 0;
    }
    .tier-free { background: #f0f0f0; color: #888; }
    .tier-paid { background: #fff8f0; color: #a8854a; }

    .upgrade-bar {
      display: none;
      background: #fff8f0;
      border-bottom: 1px solid #f0dcc0;
      padding: 8px 16px;
      text-align: center;
      font-size: 0.78rem;
      color: #8b5a2b;
      flex-shrink: 0;
    }
    .upgrade-bar.show { display: block; }
    .upgrade-bar a {
      color: #a8854a;
      font-weight: 500;
      text-decoration: none;
    }

    /* === 消息区域 === */
    .messages-wrap {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overscroll-behavior: contain;
    }

    /* 欢迎提示 */
    .welcome-hint {
      text-align: center;
      color: var(--ink-light);
      font-size: 0.85rem;
      flex: 1;
      min-height: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .welcome-hint .hex-title {
      font-size: 1.35rem;
      color: var(--accent);
      font-weight: 300;
      letter-spacing: 0.15em;
    }
    .welcome-hint .sub { font-size: 0.75rem; opacity: .65; }

    /* 消息 */
    .msg {
      width: 100%;
      line-height: 1.65;
      font-size: 0.92rem;
    }

    /* AI 消息 - 左对齐 */
    .msg.ai {
      display: flex;
      justify-content: flex-start;
    }
    .msg.ai .bubble {
      background: var(--card-bg);
      color: var(--ink-mid);
      padding: 11px 14px;
      border-radius: 16px 16px 16px 4px;
      border: 1px solid var(--border);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      max-width: min(85%, 480px);
      width: 100%;
      word-break: break-word;
      -webkit-word-break: break-word;
    }
    /* AI 消息内容区：column 布局，确保按钮在文字下方 */
    .msg.ai .msg-content {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: min(85%, 480px);
    }
    .msg.ai .bubble p { margin-bottom: 5px; }
    .msg.ai .bubble p:last-child { margin-bottom: 0; }

    /* 用户消息 - 右对齐 */
    .msg.user {
      display: flex;
      justify-content: flex-end;
    }
    .msg.user .bubble {
      background: var(--ink);
      color: #fff;
      padding: 11px 14px;
      border-radius: 16px 16px 4px 16px;
      max-width: min(85%, 480px);
      word-break: break-word;
      -webkit-word-break: break-word;
    }

    /* 加载动画 */
    .ai-loading {
      display: inline-flex;
      gap: 4px;
      align-items: center;
      padding: 2px 0;
    }
    .ai-loading span {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #bbb;
      animation: dot 1.2s infinite;
    }
    .ai-loading span:nth-child(2){ animation-delay:.15s; }
    .ai-loading span:nth-child(3){ animation-delay:.3s; }
    @keyframes dot {
      0%,80%,100%{ transform:scale(0.7); opacity:.4; }
      40%      { transform:scale(1);   opacity:1; }
    }

    /* === 输入区 === */
    .input-area {
      padding: 8px 12px 16px;
      background: rgba(247,245,242,0.97);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-top: 1px solid rgba(0,0,0,0.06);
      flex-shrink: 0;
    }

    .input-inner {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      background: #fff;
      border: 1.5px solid rgba(0,0,0,0.12);
      border-radius: 14px;
      padding: 6px 10px;
      transition: border-color .2s, box-shadow .2s;
    }
    .input-inner:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(201,169,110,0.12);
    }

    .ai-textarea {
      flex: 1;
      border: none;
      outline: none;
      padding: 5px 2px;
      font-size: 0.92rem;
      font-family: inherit;
      resize: none;
      line-height: 1.5;
      max-height: 110px;
      min-height: 28px;
      height: auto;
      background: transparent;
      color: var(--ink);
    }
    .ai-textarea::placeholder { color: var(--ink-light); }
    .ai-textarea:disabled {
      background: transparent;
      color: #aaa;
      cursor: not-allowed;
    }

    .send-btn {
      width: 100%;
      height: 44px;
      border-radius: 12px;
      border: none;
      background: var(--ink);
      color: #fff;
      cursor: pointer;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.12em;
      transition: background .2s, transform .15s;
      display: block;
      margin-top: 8px;
    }
    .send-btn:hover { background: #1a1a1a; }
    .send-btn:active { transform: scale(0.97); }
    .send-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .send-btn:disabled:hover { background: var(--ink); }

    /* === 极小屏 (< 360px) === */
    @media (max-width: 359px) {
      .nav-bar { padding: 8px 12px; }
      .status-bar { padding: 4px 12px; font-size: 0.68rem; }
      .messages-wrap { padding: 12px 10px; gap: 12px; }
      .welcome-hint { font-size: 0.8rem; }
      .welcome-hint .hex-title { font-size: 1.2rem; }
      .input-area { padding: 6px 10px 14px; }
      .input-inner { padding: 5px 8px; border-radius: 12px; }
      .msg { font-size: 0.88rem; }
      .msg.ai .bubble, .msg.user .bubble { padding: 10px 12px; border-radius: 12px 12px 12px 4px; }
      .msg.user .bubble { border-radius: 12px 12px 4px 12px; }
      .hex-name { max-width: 100px; font-size: 0.85rem; }
    }

    /* === 小屏 (360-480px) === */
    @media (min-width: 360px) and (max-width: 480px) {
      .nav-bar { padding: 10px 16px; }
      .messages-wrap { padding: 14px 14px; }
      .input-area { padding: 8px 14px 16px; }
      .hex-name { max-width: 140px; }
    }

    /* === 中屏以上：限制最大宽度 === */
    @media (min-width: 768px) {
      .messages-wrap {
        padding: 24px 20px;
        gap: 20px;
      }
      .msg { font-size: 0.95rem; }
      .msg.ai .bubble, .msg.user .bubble { max-width: min(70%, 560px); }
      .input-area { padding: 12px 20px 20px; }
      .input-inner { border-radius: 18px; padding: 8px 14px; }
      .ai-textarea { font-size: 0.95rem; }

      .hex-name { max-width: 200px; font-size: 1rem; }
    }

    /* === 横屏手机 === */
    @media (max-height: 500px) and (orientation: landscape) {
      .nav-bar { padding: 6px 12px; }
      .status-bar { padding: 3px 12px; }
      .welcome-hint { min-height: 100px; padding: 10px 0; }
      .messages-wrap { padding: 10px 12px; gap: 10px; }
      .input-area { padding: 6px 12px 10px; }
      .msg { font-size: 0.85rem; }
    }
    /* === 操作栏：复制 + 反馈（始终显示，放在答案正下方） === */
    .msg-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      opacity: 1;
      flex-wrap: wrap;
    }
    /* 不再依赖 hover 显示，用户可直接看到 */

    .copy-btn, .feedback-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.8);
      color: var(--ink-mid);
      font-size: 12px;
      cursor: pointer;
      transition: background .15s, color .15s, border-color .15s;
      font-family: inherit;
      line-height: 1;
    }
    .copy-btn:hover, .feedback-btn:hover {
      background: rgba(255,255,255,1);
      color: var(--ink);
      border-color: rgba(0,0,0,0.15);
    }
    .copy-btn svg, .feedback-btn svg { width: 12px; height: 12px; flex-shrink: 0; }
    .copy-btn.copied { color: var(--accent-d); border-color: var(--accent); }
    .feedback-btn.liked { color: #e07070; border-color: #e07070; background: rgba(224,112,112,0.06); }
    .feedback-btn.disliked { color: var(--ink-light); border-color: var(--ink-light); background: rgba(0,0,0,0.04); }

  </style>
</head>
<body>

<div class="app">

  <!-- 顶部导航 -->
  <div class="nav-bar">
    <div class="nav-left">
      <button class="back-btn" id="backBtn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        卦象
      </button>
      <span class="hex-name" id="navHexName"></span>
    </div>
    <a class="user-bar" href="profile.html">
      <div class="user-avatar-sm" id="userAvatarSm">?</div>
    </a>
  </div>

  <!-- 状态栏 -->
  <div class="status-bar">
    <span id="tierBadge" class="tier-badge tier-free">免费用户</span>
    <span id="statusText">加载中...</span>
  </div>

  <!-- 升级提示 -->
  <div class="upgrade-bar" id="upgradeBar">
    今日免费额度已用完 ·
    <a href="billing.html">$9.99/月 订阅</a>
    · 或 <a href="profile.html">登录账户</a>
  </div>

  <!-- 消息列表 -->
  <div class="messages-wrap" id="messages">
    <div class="welcome-hint" id="welcomeHint">
      <div class="hex-title" id="welcomeHexName">—</div>
      <div>心有所问，道出即可</div>
      <div class="sub">尽管说，我在这里</div>
    </div>
  </div>

  <!-- 输入区 -->
  <div class="input-area">
    <div class="input-inner">
      <textarea class="ai-textarea" id="aiInput" rows="1" placeholder="说出你想问的事。"></textarea>
    </div>
    <button class="send-btn" id="sendBtn" disabled>确认</button>
  </div>

</div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
  const params  = new URLSearchParams(location.search);
  const seed    = params.get('seed');
  const hexId   = params.get('hexId');
  const hexName = params.get('hexName') || '';

  let currentHexagramId = hexId ? Number(hexId) : null;
  let currentYaos       = null;

  // ========== 历史记录 localStorage ==========
  var HIST_KEY = 'zen_history';
  function getHist() {
    try { var h = localStorage.getItem(HIST_KEY); return h ? JSON.parse(h) : []; } catch(e) { return []; }
  }
  function saveHist(arr) {
    try { localStorage.setItem(HIST_KEY, JSON.stringify(arr)); } catch(e) {}
  }
  function addHistory(hexId, hexName, question, answer) {
    var list = getHist();
    list.unshift({ hex: hexName || '', hexId: hexId || null, question: question || '', date: new Date().toLocaleString('zh-CN') });
    if (list.length > 50) list = list.slice(0, 50);
    saveHist(list);
  }
  let subStatus         = { tier: 'free', remaining: 3 };
  let seedTimestamp     = null;
  let seedX             = null;
  let seedY             = null;

  // 用户信息 + 登录状态验证
  (async function renderUserBar() {
    const token = localStorage.getItem('zen_token');
    let user = JSON.parse(localStorage.getItem('zen_user') || 'null');

    // 如果有 token，尝试从服务器验证并刷新 zen_user
    if (token && (!user || !user.email)) {
      try {
        const res = await fetch('/api/auth/me', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        if (data.success) {
          const u = data.data;
          user = {
            userId: u.userId,
            email: u.email || '',
            nickname: u.nickname || '',
            isVip: u.subscription && u.subscription.tier === 'paid',
            remaining: u.subscription && u.subscription.remaining !== undefined ? u.subscription.remaining : 3
          };
          localStorage.setItem('zen_user', JSON.stringify(user));
          localStorage.setItem('zen_token', token); // 确保 token 存在
        } else {
          // token 失效，清空
          localStorage.removeItem('zen_token');
          localStorage.removeItem('zen_user');
          user = null;
        }
      } catch(e) {
        // 网络失败，用本地缓存
      }
    }

    if (user && (user.nickname || user.email)) {
      const name = user.nickname || user.email.split('@')[0];
      document.getElementById('userAvatarSm').textContent = name.charAt(0).toUpperCase();
      // 更新订阅状态显示
      if (user.isVip) {
        document.getElementById('tierBadge').className = 'tier-badge tier-paid';
        document.getElementById('tierBadge').textContent = 'VIP 会员';
        document.getElementById('statusText').textContent = '无限提问';
        document.getElementById('aiInput').disabled = false;
        document.getElementById('sendBtn').disabled = false;
        document.getElementById('upgradeBar').classList.remove('show');
      } else {
        document.getElementById('tierBadge').className = 'tier-badge tier-free';
        document.getElementById('tierBadge').textContent = '免费用户';
        document.getElementById('statusText').textContent = '今日剩余 ' + (user.remaining || 0) + ' 次';
      }
    }
  })();

  // 显示卦名
  if (hexName) {
    document.getElementById('navHexName').textContent = hexName;
    document.getElementById('welcomeHexName').textContent = hexName;
  }

  // 返回
  document.getElementById('backBtn').addEventListener('click', () => {
    if (seed) {
      location.href = 'content.html?seed=' + encodeURIComponent(seed);
    } else {
      history.back();
    }
  });

  // 状态栏
  function renderStatusBar() {
    const badgeEl = document.getElementById('tierBadge');
    const textEl  = document.getElementById('statusText');

    if (subStatus.tier === 'paid') {
      badgeEl.className   = 'tier-badge tier-paid';
      badgeEl.textContent = 'VIP 会员';
      textEl.textContent  = '无限提问';
    } else {
      badgeEl.className   = 'tier-badge tier-free';
      badgeEl.textContent = '免费用户';
      textEl.textContent  = '今日剩余 ' + subStatus.remaining + ' 次';
    }

    const exhausted = subStatus.tier === 'free' && subStatus.remaining <= 0;
    document.getElementById('upgradeBar').classList.toggle('show', exhausted);
    document.getElementById('aiInput').disabled  = exhausted;
    document.getElementById('sendBtn').disabled  = exhausted || !document.getElementById('aiInput').value.trim();
  }

  // 初始化
  (async function init() {
    if (!currentHexagramId && seed) {
      try {
        const parts = seed.split('|');
        let ts, x, y, uid;
        if (parts.length >= 3) {
          ts = parts[0];
          [x, y] = parts[1].split(',');
          uid = parts[2];
        } else {
          [ts, , uid, , x] = parts;
        }
        seedTimestamp = Number(ts);
        seedX = Number(x);
        seedY = Number(y);
        const result = await ZenTap.generateHexagramResult({ timestamp: seedTimestamp, uid, x: seedX, y: seedY });
        currentHexagramId = result.main?.id;
        currentYaos       = result.main?.yaos;
        const name = result.summary || '';
        if (name) {
          document.getElementById('navHexName').textContent    = name;
          document.getElementById('welcomeHexName').textContent = name;
        }
      } catch(e) {
        console.warn('解算卦象失败', e);
      }
    }

    try {
      subStatus = await ZenTapAI.getSubscription();
    } catch(e) {}

    renderStatusBar();
  })();

  // 输入监听
  const inputEl = document.getElementById('aiInput');
  const sendBtn = document.getElementById('sendBtn');

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 110) + 'px';
    sendBtn.disabled = !inputEl.value.trim() || (subStatus.tier === 'free' && subStatus.remaining <= 0);
  });
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!sendBtn.disabled) send();
    }
  });
  sendBtn.addEventListener('click', e => send(e));

  // 发送
  async function send(e) {
    const q = inputEl.value.trim();
    if (!q) return;
    if (subStatus.tier === 'free' && subStatus.remaining <= 0) return;

    const hint = document.getElementById('welcomeHint');
    if (hint) hint.remove();

    // 取三个用户报数：① 点击位置归一化(0-999) ② 时间戳毫秒末位(0-999) ③ 问题字数(0-999)
    const nowTs = Date.now();
    const rect = sendBtn.getBoundingClientRect();
    const btnClickX = e ? Math.round(e.clientX - rect.left) : 0;
    const btnWidth = Math.max(rect.width, 1);
    const userNumberA = Math.round((btnClickX / btnWidth) * 999);
    const userNumberB = nowTs % 1000;
    const userNumberC = q.length % 1000;

    appendMsg('user', q);
    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    const { bubble, actionsBar } = appendMsg('ai', '<div class="ai-loading"><span></span><span></span><span></span></div>', true);

    // 绑定复制按钮
    if (actionsBar) {
      const copyBtn = actionsBar.querySelector('.copy-btn');
      copyBtn.addEventListener('click', () => {
        const answerText = bubble.textContent || '';
        navigator.clipboard.writeText(answerText).then(() => {
          copyBtn.classList.add('copied');
          copyBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> 已复制';
          setTimeout(() => {
            copyBtn.classList.remove('copied');
            copyBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> 复制';
          }, 2000);
        });
      });

      // 绑定反馈按钮
      const uid = typeof ZenTapAI !== 'undefined' && ZenTapAI.getUid ? ZenTapAI.getUid() : null;
      let voted = false;
      actionsBar.querySelectorAll('.feedback-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (voted) return;
          const vote = parseInt(btn.dataset.vote);
          voted = true;
          btn.classList.add(vote === 1 ? 'liked' : 'disliked');
          // 立即高亮，异步存案例
          try {
            await fetch('/api/feedback', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                uid, userNumberA, userNumberB, userNumberC,
                timestamp: nowTs, hexagramId: currentHexagramId,
                yaos: currentYaos, question: q, answer: bubble.textContent || '', feedback: vote
              })
            });
          } catch(_) {}
        });
      });
    }

    try {
      const result = await ZenTapAI.askAi({ hexagramId: currentHexagramId, question: q, yaos: currentYaos, mode: 'daliuren', timestamp: nowTs, userNumberA, userNumberB, userNumberC });
      bubble.innerHTML = formatResponse(result.answer);
      // 存历史到本地
      addHistory(currentHexagramId, result.summary || '', q, result.answer || '');
      // 成功后存案例（feedback 初始为 null，待用户点按钮时更新）
      (async () => {
        try {
          const uid = typeof ZenTapAI !== 'undefined' && ZenTapAI.getUid ? ZenTapAI.getUid() : null;
          await fetch('/api/feedback', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              uid, userNumberA, userNumberB, userNumberC,
              timestamp: nowTs, hexagramId: currentHexagramId,
              yaos: currentYaos, question: q, answer: result.answer || '', feedback: null
            })
          });
        } catch(_) {}
      })();
      subStatus.remaining = result.remaining ?? subStatus.remaining;
      renderStatusBar();
    } catch(e) {
      if (e.code === 'QUOTA_EXCEEDED') {
        subStatus.remaining = 0;
        bubble.innerHTML = '<p>今日免费额度已用完，明日可继续提问，或订阅会员无限使用。</p>';
        renderStatusBar();
      } else {
        bubble.innerHTML = '<p style="color:#c05030;">出错了：' + escapeHtml(e.message) + '</p>';
      }
    }
  }

  function appendMsg(role, html, tempActions = false) {
    const messagesEl = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = role === 'ai' ? html : escapeHtml(html);

    // AI 消息追加操作栏（包裹在 msg-content 内，确保按钮在文字下方）
    let actionsBar = null;
    if (role === 'ai') {
      const contentWrap = document.createElement('div');
      contentWrap.className = 'msg-content';
      contentWrap.appendChild(bubble);

      actionsBar = document.createElement('div');
      actionsBar.className = 'msg-actions' + (tempActions ? ' msg-actions-temp' : '');
      actionsBar.innerHTML =
        '<button class="copy-btn" title="复制">\
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>\
          复制\
        </button>\
        <button class="feedback-btn" data-vote="1" title="有帮助">\
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>\
        </button>\
        <button class="feedback-btn" data-vote="-1" title="没帮助">\
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3zm7-13h2.67A2.31 2.31 0 0 1 22 4v7a2.31 2.31 0 0 1-2.33 2H17"/></svg>\
        </button>';
      contentWrap.appendChild(actionsBar);
      div.appendChild(contentWrap);
    } else {
      // 用户消息直接加 bubble
      div.appendChild(bubble);
    }

    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return { bubble, actionsBar };
  }

  function formatResponse(text) {
    return text.split('\n').filter(l => l.trim()).map(line => {
      line = line.trim();
      if (/^[一二三四五六七八九十][.、:：]/.test(line) || /^[-*#]/.test(line)) {
        return '<p><strong>' + escapeHtml(line) + '</strong></p>';
      }
      return '<p>' + escapeHtml(line) + '</p>';
    }).join('');
  }

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }
</script>
