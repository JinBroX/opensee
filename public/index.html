<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenTree</title>
  <style>
    /* ─── Reset ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0c0b0e;
      --ink:       rgba(245, 238, 228, 0.92);
      --ink-dim:   rgba(245, 238, 228, 0.45);
      --ink-ghost: rgba(245, 238, 228, 0.18);
      --accent:    rgba(201, 169, 110, 0.7);
      --fog-a:     rgba(180, 160, 140, 0.06);
      --fog-b:     rgba(160, 145, 125, 0.04);
      --fog-c:     rgba(200, 180, 150, 0.05);
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      color: var(--ink);
      cursor: default;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Grain Texture Overlay ─── */
    .grain {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 50;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    /* ─── Atmospheric Background ─── */
    .atmo {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
    }

    /* Deep gradient base */
    .atmo::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 120% 80% at 50% 0%, rgba(30,28,35,0.8) 0%, transparent 70%),
        radial-gradient(ellipse 80% 60% at 20% 100%, rgba(20,18,25,0.9) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 20%, rgba(25,22,30,0.6) 0%, transparent 60%),
        var(--bg);
    }

    /* Fog layers */
    .atmo::after {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 70% 40% at 30% 60%, var(--fog-a) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 70% 30%, var(--fog-b) 0%, transparent 70%),
        radial-gradient(ellipse 90% 30% at 50% 80%, var(--fog-c) 0%, transparent 70%);
      animation: fogDrift 28s ease-in-out infinite alternate;
    }

    @keyframes fogDrift {
      0%   { transform: translate(0, 0) scale(1); }
      33%  { transform: translate(-2%, 1%) scale(1.02); }
      66%  { transform: translate(1.5%, -1%) scale(0.98); }
      100% { transform: translate(-1%, 0.5%) scale(1.01); }
    }

    /* ─── Floating Orbs ─── */
    .orbs {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 1;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      animation: orbFloat linear infinite;
    }

    .orb:nth-child(1) {
      width: 55vw; height: 55vw;
      left: -15%; top: -10%;
      background: radial-gradient(circle, rgba(40,36,45,0.5) 0%, transparent 70%);
      animation-duration: 40s;
      animation-delay: -8s;
    }
    .orb:nth-child(2) {
      width: 40vw; height: 40vw;
      right: -10%; bottom: -5%;
      background: radial-gradient(circle, rgba(35,32,40,0.45) 0%, transparent 70%);
      animation-duration: 55s;
      animation-delay: -22s;
    }
    .orb:nth-child(3) {
      width: 30vw; height: 30vw;
      left: 20%; bottom: 20%;
      background: radial-gradient(circle, rgba(45,40,50,0.3) 0%, transparent 70%);
      animation-duration: 48s;
      animation-delay: -15s;
    }
    .orb:nth-child(4) {
      width: 20vw; height: 20vw;
      right: 30%; top: 10%;
      background: radial-gradient(circle, rgba(50,45,55,0.25) 0%, transparent 70%);
      animation-duration: 65s;
      animation-delay: -30s;
    }

    @keyframes orbFloat {
      0%   { transform: translate(0, 0) scale(1); }
      25%  { transform: translate(2vw, -1.5vw) scale(1.03); }
      50%  { transform: translate(-1vw, 2vw) scale(0.97); }
      75%  { transform: translate(-2vw, -0.5vw) scale(1.02); }
      100% { transform: translate(1vw, 1vw) scale(1); }
    }

    /* ─── Vignette ─── */
    .vignette {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 2;
      background: radial-gradient(ellipse 100% 100% at 50% 50%, transparent 40%, rgba(8,7,10,0.55) 100%);
    }

    /* ─── Hero Content ─── */
    .hero {
      position: fixed; inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }

    .hero-title {
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 200;
      letter-spacing: 0.35em;
      color: var(--ink);
      opacity: 0;
      animation: fadeUp 2s ease 0.5s forwards;
    }

    .hero-sub {
      margin-top: 28px;
      font-size: 0.7rem;
      font-weight: 300;
      letter-spacing: 0.4em;
      color: var(--ink-dim);
      opacity: 0;
      animation: fadeUp 2s ease 1.2s forwards;
    }

    @keyframes fadeUp {
      0%   { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* ─── Idle Hint ─── */
    .idle-hint {
      position: fixed;
      bottom: 36px; left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-size: 0.62rem;
      letter-spacing: 0.3em;
      color: var(--ink-ghost);
      opacity: 0;
      animation: hintFade 2s ease 2.5s forwards;
      transition: opacity 1s ease;
      white-space: nowrap;
    }

    @keyframes hintFade {
      0%   { opacity: 0; }
      100% { opacity: 1; }
    }

    .idle-hint.hidden { opacity: 0 !important; }

    /* ─── Touch Zone (invisible interaction area) ─── */
    .touch-zone {
      position: fixed; inset: 0;
      z-index: 20;
      cursor: pointer;
      /* no visible style */
    }

    /* ─── Ripple ─── */
    .ripple {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 30;
      transform: translate(-50%, -50%) scale(0);
      opacity: 0;
      animation: rippleAnim 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    @keyframes rippleAnim {
      0%   { transform: translate(-50%, -50%) scale(0); opacity: 0.6; }
      60%  { transform: translate(-50%, -50%) scale(1); opacity: 0.15; }
      100% { transform: translate(-50%, -50%) scale(1.2); opacity: 0; }
    }

    /* ─── Transition Overlay ─── */
    .transition-overlay {
      position: fixed; inset: 0;
      z-index: 100;
      background: var(--bg);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }

    .transition-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    /* ─── Breathe Ring (transition feedback) ─── */
    .breathe-ring {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 101;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0;
      pointer-events: none;
    }

    .breathe-ring.active {
      animation: breatheRing 1.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    @keyframes breatheRing {
      0%   { width: 4px; height: 4px; opacity: 0.9; }
      60%  { width: 90vmin; height: 90vmin; opacity: 0.4; }
      100% { width: 120vmin; height: 120vmin; opacity: 0; }
    }

    /* ─── Responsive ─── */
    @media (max-width: 480px) {
      .hero-title { letter-spacing: 0.25em; }
    }
  </style>
</head>
<body>

  <!-- Atmosphere layers -->
  <div class="atmo"></div>
  <div class="orbs">
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
  </div>
  <div class="vignette"></div>
  <div class="grain"></div>

  <!-- Touch zone (full screen invisible) -->
  <div class="touch-zone" id="touchZone"></div>

  <!-- Hero text -->
  <div class="hero">
    <div class="hero-title">OpenTree</div>
    <div class="hero-sub">轻触开始</div>
  </div>

  <!-- Idle hint -->
  <div class="idle-hint" id="idleHint">任意位置</div>

  <!-- Transition -->
  <div class="transition-overlay" id="transitionOverlay"></div>
  <div class="breathe-ring" id="breatheRing"></div>

  <script>
    const touchZone = document.getElementById('touchZone');
    const overlay   = document.getElementById('transitionOverlay');
    const ring      = document.getElementById('breatheRing');
    const idleHint  = document.getElementById('idleHint');

    /* ── Ripple ── */
    function createRipple(x, y) {
      const el = document.createElement('div');
      el.className = 'ripple';
      el.style.cssText = `
        left: ${x}px; top: ${y}px;
        width: 100px; height: 100px;
        background: radial-gradient(circle,
          rgba(201,169,110,0.18) 0%,
          rgba(201,169,110,0.06) 50%,
          transparent 70%);
        border: 1px solid rgba(201,169,110,0.12);
      `;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1400);
    }

    /* ── Generate uid ── */
    let uid = localStorage.getItem('zen_uid');
    if (!uid) {
      uid = 'zen_' + Math.random().toString(36).slice(2, 10);
      localStorage.setItem('zen_uid', uid);
    }

    /* ── Touch handler ── */
    touchZone.addEventListener('click', function(e) {
      const x = e.clientX;
      const y = e.clientY;
      const ts = Date.now();

      createRipple(x, y);

      // Small delay for the ripple to register, then transition
      setTimeout(() => {
        overlay.classList.add('active');
        ring.classList.add('active');

        setTimeout(() => {
          const seed = `${ts}|${x},${y}|${uid}`;
          window.location.href = `content.html?seed=${encodeURIComponent(seed)}`;
        }, 700);
      }, 100);
    });

    /* ── Idle hint hide on first interaction ── */
    touchZone.addEventListener('mouseover', () => idleHint.classList.add('hidden'), { once: true });
    touchZone.addEventListener('touchstart', () => idleHint.classList.add('hidden'), { once: true });
  </script>

</body>
</html>
