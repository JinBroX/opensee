<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenTree</title>
  <style>
    /* ─── Reset ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0c0b0e;
      --ink:        rgba(245, 238, 228, 0.92);
      --ink-mid:    rgba(245, 238, 228, 0.60);
      --ink-dim:    rgba(245, 238, 228, 0.38);
      --ink-ghost:  rgba(245, 238, 228, 0.18);
      --accent:     rgba(201, 169, 110, 0.65);
      --accent-dim: rgba(201, 169, 110, 0.30);
      --rule:       rgba(201, 169, 110, 0.12);
      --max-w:      540px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      color: var(--ink);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ─── Page Load Animation ─── */
    body {
      animation: pageReveal 1.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    @keyframes pageReveal {
      0%   { opacity: 0; }
      100% { opacity: 1; }
    }

    /* ─── Grain Texture ─── */
    .grain {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 60;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    /* ─── Atmospheric Background ─── */
    .atmo {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
    }

    .atmo::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 120% 80% at 50% 0%, rgba(28,25,35,0.85) 0%, transparent 65%),
        radial-gradient(ellipse 70% 90% at 10% 100%, rgba(18,16,22,0.9) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 90% 30%, rgba(22,20,30,0.7) 0%, transparent 65%),
        #0c0b0e;
      animation: atmoShift 45s ease-in-out infinite alternate;
    }

    .atmo::after {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 25% 70%, rgba(50,45,55,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 75% 25%, rgba(45,40,50,0.14) 0%, transparent 70%),
        radial-gradient(ellipse 100% 30% at 50% 90%, rgba(55,48,58,0.10) 0%, transparent 70%);
      animation: fogDrift 32s ease-in-out infinite alternate;
    }

    @keyframes atmoShift {
      0%   { transform: scale(1) translate(0, 0); }
      50%  { transform: scale(1.04) translate(-1%, 1%); }
      100% { transform: scale(1.02) translate(1%, -0.5%); }
    }

    @keyframes fogDrift {
      0%   { opacity: 1; transform: translate(0, 0); }
      50%  { opacity: 0.75; transform: translate(-2%, 1%); }
      100% { opacity: 1; transform: translate(1.5%, -0.5%); }
    }

    /* ─── Vignette ─── */
    .vignette {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 1;
      background:
        radial-gradient(ellipse 100% 100% at 50% 50%, transparent 35%, rgba(8,7,10,0.6) 100%);
    }

    /* ─── Ambient Orbs ─── */
    .orbs {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 1;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      animation: orbDrift linear infinite;
    }

    .orb:nth-child(1) {
      width: 60vw; height: 60vw;
      left: -20%; top: -15%;
      background: radial-gradient(circle, rgba(30,28,38,0.4) 0%, transparent 70%);
      animation-duration: 50s;
      animation-delay: -12s;
    }
    .orb:nth-child(2) {
      width: 45vw; height: 45vw;
      right: -12%; bottom: -10%;
      background: radial-gradient(circle, rgba(25,24,35,0.35) 0%, transparent 70%);
      animation-duration: 70s;
      animation-delay: -30s;
    }
    .orb:nth-child(3) {
      width: 25vw; height: 25vw;
      left: 30%; top: 5%;
      background: radial-gradient(circle, rgba(40,36,48,0.25) 0%, transparent 70%);
      animation-duration: 60s;
      animation-delay: -20s;
    }

    @keyframes orbDrift {
      0%   { transform: translate(0, 0) scale(1) rotate(0deg); }
      33%  { transform: translate(2vw, -1vw) scale(1.04) rotate(2deg); }
      66%  { transform: translate(-1vw, 1.5vw) scale(0.97) rotate(-1deg); }
      100% { transform: translate(0.5vw, -0.5vw) scale(1.02) rotate(1deg); }
    }

    /* ─── Floating Particles (very subtle) ─── */
    .particles {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 2;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 1px; height: 1px;
      border-radius: 50%;
      background: rgba(245, 238, 228, 0.15);
      animation: particleDrift linear infinite;
    }

    @keyframes particleDrift {
      0%   { transform: translateY(0) translateX(0); opacity: 0; }
      20%  { opacity: 0.6; }
      80%  { opacity: 0.3; }
      100% { transform: translateY(-20vh) translateX(5vw); opacity: 0; }
    }

    /* ══════════════════════════════════════════
       LAYOUT
    ══════════════════════════════════════════ */

    .page {
      position: relative; z-index: 10;
    }

    /* ─── Hero Section ─── */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 32px 120px;
    }

    /* Breathing pulse behind hero */
    .hero::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 30vmin; height: 30vmin;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,169,110,0.04) 0%, transparent 70%);
      animation: heroPulse 8s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes heroPulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
      50%       { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
    }

    .hero-eyebrow {
      font-size: 0.6rem;
      letter-spacing: 0.5em;
      color: var(--ink-ghost);
      text-transform: uppercase;
      margin-bottom: 40px;
      opacity: 0;
      animation: sectionReveal 1.5s ease 0.3s forwards;
    }

    .hero-title {
      font-size: clamp(2.8rem, 8vw, 5.5rem);
      font-weight: 200;
      letter-spacing: 0.08em;
      line-height: 1.1;
      color: var(--ink);
      text-align: center;
      max-width: 600px;
      opacity: 0;
      animation: sectionReveal 2s ease 0.6s forwards;
    }

    .hero-divider {
      width: 1px;
      height: 60px;
      background: linear-gradient(to bottom, var(--accent-dim), transparent);
      margin: 48px 0 40px;
      opacity: 0;
      animation: sectionReveal 1.5s ease 1.0s forwards;
    }

    .hero-body {
      font-size: clamp(1rem, 2.5vw, 1.15rem);
      font-weight: 300;
      line-height: 2.0;
      color: var(--ink-mid);
      text-align: center;
      max-width: var(--max-w);
      letter-spacing: 0.03em;
      opacity: 0;
      animation: sectionReveal 2s ease 1.2s forwards;
    }

    /* ─── Scroll Fade-in Animation ─── */
    @keyframes sectionReveal {
      0%   { opacity: 0; transform: translateY(18px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* ─── Section Divider ─── */
    .section-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 32px 0;
      gap: 16px;
    }

    .section-divider::before,
    .section-divider::after {
      content: '';
      flex: 1;
      max-width: 120px;
      height: 1px;
      background: var(--rule);
    }

    .section-divider-dot {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: var(--accent-dim);
    }

    /* ─── Sections ─── */
    .section {
      padding: 80px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .section-inner {
      width: 100%;
      max-width: var(--max-w);
    }

    .section-label {
      font-size: 0.58rem;
      letter-spacing: 0.55em;
      color: var(--accent-dim);
      text-transform: uppercase;
      margin-bottom: 32px;
      opacity: 0;
      animation: sectionReveal 1.5s ease forwards;
    }

    .section-text {
      font-size: clamp(1rem, 2.2vw, 1.12rem);
      font-weight: 300;
      line-height: 2.1;
      color: var(--ink-mid);
      letter-spacing: 0.02em;
      opacity: 0;
      animation: sectionReveal 1.8s ease forwards;
    }

    /* Stagger sections */
    .section:nth-child(odd) .section-label,
    .section:nth-child(odd) .section-text {
      animation-delay: 0.1s;
    }

    /* ─── Final Reminder ─── */
    .reminder {
      padding: 120px 32px 160px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .reminder-line {
      width: 1px;
      height: 60px;
      background: linear-gradient(to bottom, var(--rule), transparent);
      margin-bottom: 40px;
    }

    .reminder-text {
      font-size: clamp(0.75rem, 1.8vw, 0.85rem);
      font-weight: 300;
      letter-spacing: 0.25em;
      color: var(--ink-ghost);
      line-height: 2.2;
      max-width: 380px;
      opacity: 0;
      animation: sectionReveal 2s ease forwards;
    }

    /* ─── Action Row ─── */
    .action-row {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 50;
      padding: 24px 32px 32px;
      display: flex;
      justify-content: center;
      gap: 32px;
      background: linear-gradient(to top, rgba(12,11,14,0.9) 0%, transparent 100%);
      opacity: 0;
      animation: fadeUp 1.5s ease 1.8s forwards;
      pointer-events: none;
    }

    @keyframes fadeUp {
      0%   { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); pointer-events: all; }
    }

    .action-btn {
      font-size: 0.62rem;
      letter-spacing: 0.3em;
      color: var(--ink-ghost);
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      text-transform: uppercase;
      padding: 8px 0;
      transition: color 0.4s ease;
    }

    .action-btn:hover {
      color: var(--ink-mid);
    }

    .action-btn.primary {
      color: var(--accent);
    }

    .action-btn.primary:hover {
      color: var(--ink-mid);
    }

    /* ─── Yaos (subtle, almost hidden) ─── */
    .yaos-bar {
      position: fixed;
      top: 32px; right: 32px;
      z-index: 50;
      display: flex;
      gap: 6px;
      opacity: 0;
      animation: fadeUp 1.5s ease 2.2s forwards;
    }

    .yao-pip {
      width: 4px;
      height: 12px;
      border-radius: 2px;
      background: var(--ink-ghost);
      transition: all 0.3s ease;
    }

    .yao-pip.yang {
      background: var(--accent-dim);
    }

    /* ─── AI Modal ─── */
    .ai-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(12, 11, 14, 0.88);
      z-index: 200;
      justify-content: center;
      align-items: flex-end;
      backdrop-filter: blur(8px);
    }

    .ai-modal-overlay.active { display: flex; }

    .ai-modal {
      background: rgba(18, 17, 22, 0.96);
      border: 1px solid rgba(201, 169, 110, 0.08);
      border-radius: 24px 24px 0 0;
      width: 100%;
      max-width: 680px;
      max-height: 88vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      backdrop-filter: blur(20px);
    }

    .ai-modal-handle {
      width: 36px; height: 4px;
      border-radius: 2px;
      background: rgba(245, 238, 228, 0.1);
      margin: 14px auto 0;
    }

    .ai-header {
      padding: 16px 28px 14px;
      border-bottom: 1px solid rgba(245, 238, 228, 0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .ai-header-title {
      font-size: 0.6rem;
      letter-spacing: 0.35em;
      color: var(--ink-ghost);
      text-transform: uppercase;
    }

    .ai-tier-badge {
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      color: var(--accent-dim);
      padding: 3px 10px;
      border: 1px solid rgba(201,169,110,0.15);
      border-radius: 100px;
    }

    .ai-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 0;
    }

    .ai-messages::-webkit-scrollbar { width: 3px; }
    .ai-messages::-webkit-scrollbar-track { background: transparent; }
    .ai-messages::-webkit-scrollbar-thumb { background: rgba(201,169,110,0.1); border-radius: 2px; }

    .ai-msg {
      max-width: 88%;
      line-height: 1.75;
      font-size: 0.9rem;
      font-weight: 300;
      letter-spacing: 0.02em;
    }

    .ai-msg.user {
      align-self: flex-end;
      color: var(--ink-mid);
      padding: 10px 18px;
      border: 1px solid rgba(245, 238, 228, 0.08);
      border-radius: 18px 18px 4px 18px;
    }

    .ai-msg.ai {
      align-self: flex-start;
      color: var(--ink-mid);
      padding: 12px 20px;
      border-radius: 18px 18px 18px 4px;
      border: 1px solid rgba(245, 238, 228, 0.06);
    }

    .ai-msg.ai p { margin-bottom: 6px; }
    .ai-msg.ai p:last-child { margin-bottom: 0; }

    .ai-welcome {
      text-align: center;
      color: var(--ink-ghost);
      font-size: 0.78rem;
      letter-spacing: 0.15em;
      padding: 20px 0;
    }

    .ai-loading {
      display: inline-flex; gap: 4px; align-items: center;
    }

    .ai-loading span {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--ink-ghost);
      animation: loadDot 1.2s infinite;
    }

    .ai-loading span:nth-child(2){ animation-delay: 0.15s; }
    .ai-loading span:nth-child(3){ animation-delay: 0.3s; }

    @keyframes loadDot {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
      40%           { transform: scale(1); opacity: 1; }
    }

    .ai-input-area {
      padding: 14px 20px 32px;
      border-top: 1px solid rgba(245, 238, 228, 0.05);
      display: flex; gap: 10px; align-items: flex-end;
    }

    .ai-input {
      flex: 1;
      background: rgba(245, 238, 228, 0.04);
      border: 1px solid rgba(245, 238, 228, 0.08);
      border-radius: 16px;
      padding: 12px 18px;
      font-size: 0.9rem;
      font-family: inherit;
      color: var(--ink-mid);
      resize: none;
      outline: none;
      line-height: 1.5;
      min-height: 48px; max-height: 100px;
      transition: border-color 0.3s;
    }

    .ai-input:focus {
      border-color: rgba(201, 169, 110, 0.2);
      background: rgba(245, 238, 228, 0.06);
    }

    .ai-input::placeholder { color: var(--ink-ghost); }

    .ai-send {
      width: 48px; height: 48px;
      border-radius: 16px;
      border: none;
      background: rgba(201, 169, 110, 0.12);
      color: var(--accent);
      font-size: 1.1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.25s;
    }

    .ai-send:hover { background: rgba(201, 169, 110, 0.2); }
    .ai-send:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ─── Upgrade hint ─── */
    .ai-upgrade {
      margin: 0 28px 16px;
      padding: 16px 20px;
      border: 1px solid rgba(201,169,110,0.1);
      border-radius: 14px;
      background: rgba(201,169,110,0.04);
      text-align: center;
      font-size: 0.72rem;
      color: var(--ink-ghost);
      letter-spacing: 0.1em;
      display: none;
    }

    .ai-upgrade.active { display: block; }

    /* ─── Responsive ─── */
    @media (max-width: 600px) {
      .hero { padding: 60px 24px 100px; }
      .section { padding: 64px 24px; }
      .reminder { padding: 100px 24px 140px; }
      .hero-title { font-size: clamp(2.2rem, 10vw, 3.5rem); }
      .yaos-bar { top: 20px; right: 20px; }
      .ai-modal { border-radius: 20px 20px 0 0; }
    }

    /* ─── Scroll-driven reveal (Intersection Observer) ─── */
    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  transform 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ─── Long text paragraphs get extra breathing room ─── */
    .section-text.breathing {
      line-height: 2.3;
      font-size: clamp(1.05rem, 2.3vw, 1.18rem);
    }

    /* ─── Risk section gets a different tint ─── */
    .section.risk .section-label { color: rgba(180, 140, 110, 0.4); }
    .section.risk .section-text { color: rgba(245, 238, 228, 0.50); }
  </style>
</head>
<body>

  <!-- Atmosphere -->
  <div class="atmo"></div>
  <div class="orbs">
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
  </div>
  <div class="vignette"></div>
  <div class="grain"></div>

  <!-- Particles -->
  <div class="particles" id="particles"></div>

  <!-- Page -->
  <div class="page" id="app">

    <!-- Hero -->
    <section class="hero">
      <div class="hero-eyebrow" id="eyebrow">此刻的状态</div>
      <h1 class="hero-title" id="heroTitle">—</h1>
      <div class="hero-divider"></div>
      <p class="hero-body" id="heroBody">—</p>
    </section>

    <!-- Divider -->
    <div class="section-divider">
      <span class="section-divider-dot"></span>
    </div>

    <!-- Trend -->
    <section class="section">
      <div class="section-inner">
        <div class="section-label reveal">趋势感知</div>
        <p class="section-text breathing reveal" id="trendText">—</p>
      </div>
    </section>

    <!-- Divider -->
    <div class="section-divider">
      <span class="section-divider-dot"></span>
    </div>

    <!-- Mind -->
    <section class="section">
      <div class="section-inner">
        <div class="section-label reveal">行动建议</div>
        <p class="section-text breathing reveal" id="mindText">—</p>
      </div>
    </section>

    <!-- Divider -->
    <div class="section-divider">
      <span class="section-divider-dot"></span>
    </div>

    <!-- Risk -->
    <section class="section risk">
      <div class="section-inner">
        <div class="section-label reveal">特别注意</div>
        <p class="section-text breathing reveal" id="riskText">—</p>
      </div>
    </section>

    <!-- Reminder -->
    <div class="reminder">
      <div class="reminder-line reveal"></div>
      <p class="reminder-text reveal" id="reminderText">状态不是答案。<br>它是提问的开始。</p>
    </div>

  </div>

  <!-- Yaos indicator (top right) -->
  <div class="yaos-bar" id="yaosBar"></div>

  <!-- Action row -->
  <div class="action-row">
    <button class="action-btn" onclick="location.href='index.html'">再次进入</button>
    <button class="action-btn primary" id="aiAskBtn">深入对话</button>
  </div>

  <!-- AI Modal -->
  <div class="ai-modal-overlay" id="aiModal">
    <div class="ai-modal">
      <div class="ai-modal-handle"></div>
      <div class="ai-header">
        <span class="ai-header-title">深入对话</span>
        <span class="ai-tier-badge" id="aiTierBadge">免费用户</span>
      </div>
      <div class="ai-upgrade" id="aiUpgradeHint">今日免费额度已用完 · 深入对话请订阅</div>
      <div class="ai-messages" id="aiMessages">
        <div class="ai-welcome">说出你的困惑<br><span style="font-size:0.68rem;opacity:0.5;margin-top:6px;display:block;">系统正在感知你的状态场</span></div>
      </div>
      <div class="ai-input-area">
        <textarea class="ai-input" id="aiInput" rows="1" placeholder="说出你的困惑..."></textarea>
        <button class="ai-send" id="aiSendBtn" disabled>↑</button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script>
    /* ── Generate particles ── */
    (function() {
      const container = document.getElementById('particles');
      for (let i = 0; i < 18; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.cssText = `
          left: ${Math.random() * 100}%;
          top: ${60 + Math.random() * 40}%;
          animation-duration: ${12 + Math.random() * 20}s;
          animation-delay: ${-Math.random() * 20}s;
          opacity: ${0.2 + Math.random() * 0.4};
        `;
        container.appendChild(p);
      }
    })();

    /* ── Intersection Observer for scroll reveals ── */
    (function() {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.15, rootMargin: '0px 0px -40px 0px' });

      document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    })();

    /* ── Load hexagram data ── */
    let currentHexagramId = null;
    let currentYaos = null;
    let subStatus = { tier: 'free', remaining: 3 };

    (async function() {
      const params = new URLSearchParams(location.search);
      const seed = params.get('seed');
      if (!seed) return;

      try {
        const parts = seed.split('|');
        let ts, uid;
        if (parts.length >= 3) {
          ts = parts[0];
          uid = parts[2];
        } else {
          [ts, , uid] = parts;
        }

        const result = await ZenTap.generateHexagramResult({ timestamp: Number(ts), uid: uid });
        const seg = result.main.segments;
        currentHexagramId = result.main.id;
        currentYaos = result.main.yaos;

        /* Populate content */
        document.getElementById('heroTitle').textContent = result.summary;
        document.getElementById('heroBody').textContent = seg.status;
        document.getElementById('trendText').textContent = seg.trend;
        document.getElementById('mindText').textContent = seg.mind;
        document.getElementById('riskText').textContent = seg.risk;

        /* Render yaos bar (top right) */
        const yaosBar = document.getElementById('yaosBar');
        yaosBar.innerHTML = (currentYaos || []).map(y =>
          `<div class="yao-pip ${(y === 7 || y === 9) ? 'yang' : 'yin'}"></div>`
        ).join('');

      } catch(e) {
        console.warn('Failed to load hexagram:', e.message);
      }
    })();

    /* ── AI Chat ── */
    const modal   = document.getElementById('aiModal');
    const msgs    = document.getElementById('aiMessages');
    const inputEl = document.getElementById('aiInput');
    const sendBtn = document.getElementById('aiSendBtn');

    document.getElementById('aiAskBtn').addEventListener('click', async () => {
      modal.classList.add('active');
      await refreshSubscriptionStatus();
      inputEl.focus();
    });

    modal.addEventListener('click', e => {
      if (e.target === modal) modal.classList.remove('active');
    });

    async function refreshSubscriptionStatus() {
      try {
        subStatus = await ZenTapAI.getSubscription();
        renderStatusBar();
      } catch(e) { /* ignore */ }
    }

    function renderStatusBar() {
      const badge = subStatus.tier === 'paid' ? '付费会员' : '免费用户';
      const quota = subStatus.tier === 'paid' ? '无限' : `剩余 ${subStatus.remaining} 次`;
      document.getElementById('aiTierBadge').textContent = `${badge} · ${quota}`;
      const show = (subStatus.tier === 'free' && subStatus.remaining <= 0);
      document.getElementById('aiUpgradeHint').classList.toggle('active', show);
    }

    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
      sendBtn.disabled = !inputEl.value.trim();
    });

    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (!sendBtn.disabled) submitQuestion();
      }
    });

    sendBtn.addEventListener('click', submitQuestion);

    async function submitQuestion() {
      const q = inputEl.value.trim();
      if (!q) return;
      if (subStatus.tier === 'free' && subStatus.remaining <= 0) return;

      appendMessage('user', q);
      inputEl.value = ''; inputEl.style.height = 'auto'; sendBtn.disabled = true;

      const aiEl = appendMessage('ai', '<div class="ai-loading"><span></span><span></span><span></span></div>');

      try {
        const result = await ZenTapAI.askAi({
          hexagramId: currentHexagramId,
          question: q,
          yaos: currentYaos
        });
        aiEl.innerHTML = formatAIResponse(result.answer);
        subStatus.remaining = result.remaining;
        renderStatusBar();
      } catch(e) {
        if (e.code === 'QUOTA_EXCEEDED') {
          subStatus.tier = e.tier || 'free';
          subStatus.remaining = e.remaining || 0;
          aiEl.innerHTML = '<p>今日免费额度已用完，明日可继续，或订阅深入对话。</p>';
          renderStatusBar();
        } else {
          aiEl.innerHTML = `<p style="color:rgba(180,140,110,0.8);">${e.message || '系统暂时不可用'}</p>`;
        }
      }
    }

    function appendMessage(role, content) {
      const w = msgs.querySelector('.ai-welcome');
      if (w) w.remove();
      const div = document.createElement('div');
      div.className = `ai-msg ${role}`;
      div.innerHTML = role === 'ai' ? content : escapeHtml(content);
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
      return div;
    }

    function formatAIResponse(text) {
      return text.split('\n').filter(l => l.trim()).map(line => {
        line = line.trim();
        return `<p>${escapeHtml(line)}</p>`;
      }).join('');
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
  </script>

</body>
</html>
