<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenSee</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --mist:rgba(200,205,215,0.75);--mist-dim:rgba(200,205,215,0.45);
    --mist-faint:rgba(200,205,215,0.22);--gold:rgba(200,170,120,0.65);
    --gold-dim:rgba(200,170,120,0.3);--gold-faint:rgba(200,170,120,0.1);
    --font:'PingFang SC','Noto Sans SC','Microsoft YaHei',serif;
  }
  html,body{width:100%;height:100%;overflow:hidden;background:#080c14;font-family:var(--font);color:var(--mist);-webkit-font-smoothing:antialiased}
  canvas{position:fixed;inset:0;z-index:1}

  /* Text whisper */
  .whisper{position:fixed;z-index:2;pointer-events:none;user-select:none;
    font-size:0.95rem;font-weight:250;letter-spacing:0.12em;color:rgba(210,205,195,0.65);
    text-align:center;left:50%;top:58%;transform:translate(-50%,-50%);
    opacity:0;transition:opacity 2s ease;}
  .whisper.show{opacity:0.8}
  .brand-hint{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);z-index:2;font-size:0.45rem;letter-spacing:0.4em;color:rgba(200,195,185,0.25);font-weight:200;pointer-events:none;user-select:none}

  /* Cursor ring */
  .cursor-ring{position:fixed;z-index:3;pointer-events:none;
    width:40px;height:40px;border-radius:50%;
    border:1px solid rgba(200,180,150,0.15);
    transform:translate(-50%,-50%);opacity:0;
    transition:opacity 0.5s ease,width 0.8s ease,height 0.8s ease,border-color 0.8s ease;}
  .cursor-ring.visible{opacity:1}
  .cursor-ring.near{width:80px;height:80px;border-color:rgba(200,170,120,0.3)}
  .cursor-ring.hold{width:120px;height:120px;border-color:rgba(200,170,120,0.5)}

  /* Result overlay — kept from original */
  .interp-overlay{
    position:fixed;inset:0;z-index:80;opacity:0;pointer-events:none;
    transition:opacity 0.6s ease;display:flex;flex-direction:column;
    align-items:center;justify-content:center;overflow:hidden;}
  .interp-overlay.active{opacity:1;pointer-events:auto}
  .interp-bg{position:absolute;inset:0;z-index:0}
  .interp-bg img{width:100%;height:100%;object-fit:cover;object-position:center;filter:saturate(0.7) brightness(0.55)}
  .interp-bg::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 50%,rgba(10,15,24,0.2) 0%,rgba(4,8,14,0.7) 100%)}
  .interp-stage{position:relative;z-index:2;width:100%;max-width:420px;height:100vh;display:flex;align-items:center;justify-content:center;perspective:800px}
  .interp-card{position:absolute;width:88%;max-width:380px;background:rgba(18,24,34,0.88);border:1px solid rgba(200,180,150,0.08);border-radius:20px;padding:36px 26px 32px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;box-shadow:0 8px 40px rgba(0,0,0,0.35);transition:transform 0.5s cubic-bezier(0.22,0.61,0.36,1),opacity 0.5s ease;will-change:transform,opacity;pointer-events:none}
  .interp-card.active{pointer-events:auto}
  .interp-card-label{font-size:0.5rem;letter-spacing:0.35em;color:var(--gold-dim);font-weight:300;text-align:center}
  .interp-card-body{font-size:0.88rem;font-weight:300;color:var(--mist);text-align:center;letter-spacing:0.05em;line-height:1.85;padding:0 4px;max-width:320px}
  .interp-card-body.italic{font-style:italic;color:var(--mist-dim)}
  .interp-dots{position:fixed;right:14px;top:50%;transform:translateY(-50%);z-index:3;display:flex;flex-direction:column;gap:7px}
  .interp-dot{width:5px;height:5px;border-radius:50%;background:var(--mist-faint);transition:all 0.4s ease}
  .interp-dot.active{background:var(--gold);height:14px;border-radius:3px}
  .interp-close{position:fixed;top:18px;right:18px;z-index:5;padding:6px 18px;font-family:var(--font);font-size:0.5rem;letter-spacing:0.15em;color:var(--mist-faint);background:rgba(255,255,255,0.03);border:1px solid rgba(200,170,120,0.1);border-radius:100px;cursor:pointer;transition:all 0.4s ease;cursor:pointer}
  .interp-close:hover{color:var(--mist-dim);border-color:var(--gold-faint)}

  @media(max-width:640px){
    .interp-card{width:92%;padding:28px 20px 24px}
    .interp-card-body{font-size:0.82rem}
    .interp-dots{right:8px;gap:5px}
    .whisper{font-size:0.75rem}
    .cursor-ring{display:none}
  }
</style>
</head>
<body>

<canvas id="c"></canvas>
<div class="whisper" id="whisper"></div>
<div class="cursor-ring" id="cursorRing"></div>
<div class="brand-hint">OpenSee</div>

<!-- Result Overlay -->
<div class="interp-overlay" id="interpOverlay">
  <div class="interp-bg"><img src="opensee-1.jpg" alt="" /></div>
  <div class="interp-stage" id="interpStage"></div>
  <div class="interp-dots" id="interpDots"></div>
  <button class="interp-close" id="interpClose">← 返回</button>
</div>

<script>
/* ═══════════════════════════════════════════
   PARTICLE SYSTEM — Attention Space
   ═══════════════════════════════════════════ */
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const whisper = document.getElementById('whisper');
const cursorRing = document.getElementById('cursorRing');

let W, H;
let mouseX = -999, mouseY = -999, smoothMX = -999, smoothMY = -999;
let mouseActive = false, mouseNear = false;
let pressStart = 0, pressing = false, pressTriggered = false;
let particles = [];
let time = 0;
let collapsePhase = 0; // 0=idle, >0=collapsing
let collapseTarget = { x: 0, y: 0 };
let whisperTimer = null;

const PARTICLE_COUNT = 150;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

/* ── Particle ── */
class Particle {
  constructor() {
    this.reset(true);
  }
  reset(init) {
    const angle = Math.random() * Math.PI * 2;
    const radius = init ? Math.random() * Math.min(W, H) * 0.6 : 80 + Math.random() * 300;
    this.x = W / 2 + Math.cos(angle) * radius;
    this.y = H * 0.44 + Math.sin(angle) * radius;
    this.vx = (Math.random() - 0.5) * 0.3;
    this.vy = (Math.random() - 0.5) * 0.3;
    this.size = 0.6 + Math.random() * 2.2;
    this.alpha = 0.35 + Math.random() * 0.5;
    this.phase = Math.random() * Math.PI * 2;
    this.speed = 0.2 + Math.random() * 0.6;
  }
  update() {
    const cx = W / 2, cy = H * 0.44;
    const dx = this.x - cx, dy = this.y - cy;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const angle = Math.atan2(dy, dx);

    // Central attractor — gentle pull toward center
    const attractForce = 0.0003 + 0.0002 * Math.sin(time * 0.3 + this.phase);
    this.vx -= Math.cos(angle) * attractForce;
    this.vy -= Math.sin(angle) * attractForce;

    // Mouse pull — only when mouse is nearby
    if (mouseActive) {
      const mdx = this.x - smoothMX, mdy = this.y - smoothMY;
      const mdist = Math.sqrt(mdx * mdx + mdy * mdy);
      if (mdist < 250) {
        const mforce = collapsePhase > 0 ? 0.03 : 0.008 * (1 - mdist / 250);
        this.vx -= (mdx / mdist) * mforce;
        this.vy -= (mdy / mdist) * mforce;
      }
    }

    // Damping
    this.vx *= 0.995;
    this.vy *= 0.995;

    // Brownian noise
    this.vx += (Math.random() - 0.5) * 0.04;
    this.vy += (Math.random() - 0.5) * 0.04;

    this.x += this.vx;
    this.y += this.vy;

    // Keep in bounds — soft edge
    if (this.x < -50) this.vx += 0.05;
    if (this.x > W + 50) this.vx -= 0.05;
    if (this.y < -50) this.vy += 0.05;
    if (this.y > H + 50) this.vy -= 0.05;
  }
  draw(ctx) {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200,185,155,${this.alpha})`;
    ctx.fill();
  }
}

for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());

/* ── Mouse ── */
document.addEventListener('mousemove', (e) => {
  mouseX = e.clientX; mouseY = e.clientY;
  mouseActive = true;
  const dx = mouseX - W/2, dy = mouseY - H*0.44;
  mouseNear = Math.sqrt(dx*dx + dy*dy) < 200;
});
document.addEventListener('mouseleave', () => { mouseActive = false; mouseNear = false; });

// Touch
document.addEventListener('touchmove', (e) => {
  mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY;
  mouseActive = true;
}, {passive:true});
document.addEventListener('touchend', () => { mouseActive = false; mouseNear = false; });

/* ── Long press → generate ── */
function startPress(x, y) {
  pressStart = performance.now();
  pressing = true;
  pressTriggered = false;
  collapseTarget = { x, y };
}
function endPress() {
  pressing = false;
  pressStart = 0;
  collapsePhase = 0;
}

document.addEventListener('mousedown', (e) => startPress(e.clientX, e.clientY));
document.addEventListener('mouseup', endPress);
document.addEventListener('touchstart', (e) => {
  startPress(e.touches[0].clientX, e.touches[0].clientY);
}, {passive:true});
document.addEventListener('touchend', endPress);

/* ── Whisper messages ── */
const whispers = [
  '停一下。',
  '有些东西会慢一点出现。',
  '靠近之后再看。'
];
let whisperIdx = 0;
function showWhisper(idx) {
  whisper.textContent = whispers[idx];
  whisper.classList.add('show');
  clearTimeout(whisperTimer);
  whisperTimer = setTimeout(() => whisper.classList.remove('show'), 6000);
}

/* ═══════════════════════════════════════════
   RENDER LOOP
   ═══════════════════════════════════════════ */
function animate(ts) {
  time = ts * 0.001;

  // Smooth mouse
  if (mouseActive) {
    smoothMX += (mouseX - smoothMX) * 0.08;
    smoothMY += (mouseY - smoothMY) * 0.08;
  }

  // Collapse phase
  if (pressing && !pressTriggered) {
    const held = ts - pressStart;
    collapsePhase = Math.min(1, held / 1200); // 1.2s to full collapse
    if (held > 1200 && collapsePhase >= 1) {
      pressTriggered = true;
      triggerGeneration();
    }
  } else if (!pressing && collapsePhase > 0) {
    collapsePhase = Math.max(0, collapsePhase - 0.02); // release
  }

  // Cursor ring
  if (mouseActive && collapsePhase < 1) {
    cursorRing.style.left = mouseX + 'px';
    cursorRing.style.top = mouseY + 'px';
    cursorRing.classList.add('visible');
    cursorRing.classList.toggle('near', mouseNear);
    cursorRing.classList.toggle('hold', collapsePhase > 0.3);
  } else {
    cursorRing.classList.remove('visible', 'near', 'hold');
  }

  // Clear
  ctx.clearRect(0, 0, W, H);

  // Draw particles
  for (const p of particles) {
    p.update();
    p.draw(ctx);
  }

  // Central glow — breathing
  const cx = W / 2, cy = H * 0.44;
  const breathe = 1 + 0.3 * Math.sin(time * 0.5);

  // Core dot — subtle but visible
  ctx.beginPath();
  ctx.arc(cx, cy, 3 + breathe * 2, 0, Math.PI*2);
  ctx.fillStyle = `rgba(220,195,165,${0.4 + 0.15 * Math.sin(time * 0.5)})`;
  ctx.fill();

  // Core glow
  const glowGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 180 * breathe * (1 + collapsePhase * 2));
  glowGrad.addColorStop(0, collapsePhase > 0.5
    ? `rgba(200,175,140,${0.12 + collapsePhase * 0.25})`
    : 'rgba(200,190,160,0.18)');
  glowGrad.addColorStop(0.4, 'rgba(180,160,130,0.03)');
  glowGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = glowGrad;
  ctx.fillRect(0, 0, W, H);

  // If collapsing, draw vortex lines
  if (collapsePhase > 0.3) {
    ctx.strokeStyle = `rgba(200,170,130,${collapsePhase * 0.08})`;
    ctx.lineWidth = 0.5;
    for (let i = 0; i < 5; i++) {
      const a = time * 1.5 + i * Math.PI * 0.4;
      const r = 40 + i * 30;
      ctx.beginPath();
      ctx.arc(cx, cy, r * collapsePhase, a, a + Math.PI * 1.5);
      ctx.stroke();
    }
  }

  requestAnimationFrame(animate);
}

/* ═══════════════════════════════════════════
   GENERATION → RESULT PIPELINE
   ═══════════════════════════════════════════ */
const STATE = { current:'IDLE', salt:null, hexId:null, yaoValues:null, hexData:null };

function transition(to) {
  STATE.current = to;
  if (to === 'SEED_GATHERING') gatherSeed();
  if (to === 'INTERPRETATION') renderInterpretation();
}

async function sha256Hex(str) {
  const enc = new TextEncoder();
  const data = enc.encode(str);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2,'0')).join('');
}
function xorshift32(seed) {
  let x = seed >>> 0;
  return function(){ x^=x<<13;x>>>=0;x^=x>>>17;x>>>=0;x^=x<<5;x>>>=0;return(x>>>0)/0x100000000; };
}
function hexToU32(hex){return parseInt(hex.slice(0,8),16)>>>0;}
function randomYao(rnd){if(rnd<0.125)return 9;if(rnd<0.5)return 7;if(rnd<0.875)return 8;return 6;}
function yaosToHexId(yaos){let b=0;for(let i=0;i<6;i++){if(yaos[i]===7||yaos[i]===9)b|=(1<<i);}return'Q'+(b+1);}

function selectVersion(salt32){const b=salt32%100;return b<50?'v1':b<80?'v2':'v3';}

async function loadHexagram(hexId, version='v1'){
  const path=`data/hexagrams/${hexId}`;
  const vers=[version,'v1'].filter((v,i,a)=>a.indexOf(v)===i);
  for(const ver of vers){
    const r=await fetch(`${path}/semantic-${ver}.json`);
    if(!r.ok)continue;
    const d=await r.json();
    return{id:d.id||hexId,summary:d.summary||hexId,segments:d.main?.segments||d.segments||{},lines:d.main?.lines||d.lines||[],closing:d.closing||'',version:ver};
  }
  return{id:hexId,summary:hexId,segments:{status:'',trend:'',mind:'',risk:''},lines:[],closing:'',version:'fallback'};
}

async function gatherSeed(){
  const now=Date.now(),perfNow=performance.now();
  const entropyStr=[now,perfNow.toFixed(6),Math.random().toString(36).slice(2,10),(mouseX||W/2).toFixed(1),(mouseY||H/2).toFixed(1)].join('|');
  const h=await sha256Hex(entropyStr);
  const seed32=hexToU32(h);
  const rnd=xorshift32(seed32);
  const yaos=Array.from({length:6},()=>randomYao(rnd()));
  const hexId=yaosToHexId(yaos);
  STATE.yaoValues=yaos;STATE.hexId=hexId;

  const saltHash=parseInt(h.slice(0,4),16);
  const version=selectVersion(saltHash);
  STATE.hexData=await loadHexagram(hexId,version);
  STATE.version=version;
  transition('INTERPRETATION');
}

async function triggerGeneration(){
  whisper.textContent='';
  whisper.classList.remove('show');
  document.body.style.cursor='none';
  transition('SEED_GATHERING');
}

/* ═══════════════════════════════════════════
   COVER FLOW RESULT
   ═══════════════════════════════════════════ */
const interpOverlay=document.getElementById('interpOverlay');
const interpStage=document.getElementById('interpStage');
const interpDots=document.getElementById('interpDots');
const interpClose=document.getElementById('interpClose');
let cardDefs=[],activeIdx=0,busy=false;

interpClose.addEventListener('click',resetAll);

function layoutCards(){
  const cards=interpStage.children;
  for(let i=0;i<cards.length;i++){
    const d=i-activeIdx,ad=Math.abs(d);
    const c=cards[i];
    if(ad===0){c.style.transform='translateY(0) scale(1)';c.style.opacity='1';c.style.zIndex='10';c.classList.add('active');}
    else if(ad===1){const y=d>0?130:-130;c.style.transform=`translateY(${y}px) scale(0.82)`;c.style.opacity='0.45';c.style.zIndex='5';c.classList.remove('active');}
    else if(ad===2){const y=d>0?220:-220;c.style.transform=`translateY(${y}px) scale(0.66)`;c.style.opacity='0.2';c.style.zIndex='2';c.classList.remove('active');}
    else{c.style.transform=d>0?'translateY(300px) scale(0.5)':'translateY(-300px) scale(0.5)';c.style.opacity='0';c.style.zIndex='1';c.classList.remove('active');}
  }
  const dots=interpDots.children;
  for(let i=0;i<dots.length;i++)dots[i].classList.toggle('active',i===activeIdx);
}

function goTo(idx){if(idx<0||idx>=cardDefs.length||busy)return;busy=true;activeIdx=idx;layoutCards();setTimeout(()=>{busy=false;},500);}
function next(){goTo(activeIdx+1);}
function prev(){goTo(activeIdx-1);}

interpOverlay.addEventListener('wheel',(e)=>{e.preventDefault();if(e.deltaY>0)next();else if(e.deltaY<0)prev();},{passive:false});

let tY=0;
interpOverlay.addEventListener('touchstart',(e)=>{tY=e.touches[0].clientY;},{passive:true});
interpOverlay.addEventListener('touchend',(e)=>{const dy=tY-e.changedTouches[0].clientY;if(Math.abs(dy)>30){dy>0?next():prev();}},{passive:true});

document.addEventListener('keydown',(e)=>{
  if(!interpOverlay.classList.contains('active'))return;
  if(e.key==='ArrowDown'){e.preventDefault();next();}
  if(e.key==='ArrowUp'){e.preventDefault();prev();}
});

function renderInterpretation(){
  const d=STATE.hexData;
  const segs=d?.main?.segments||{},lines=d?.main?.lines||[];
  const summary=d?.summary||'',closing=d?.closing||'';

  cardDefs=[];
  if(summary)cardDefs.push({label:'气韵',body:summary,italic:false});
  const sm=[{key:'status',label:'映照'},{key:'mind',label:'心境'},{key:'trend',label:'流向'},{key:'risk',label:'留意'}];
  for(const s of sm){if(segs[s.key]&&!segs[s.key].includes('缺失'))cardDefs.push({label:s.label,body:segs[s.key],italic:false});}
  const yaos=STATE.yaoValues||[];const ci=[];
  for(let i=0;i<6;i++){if(yaos[i]===6||yaos[i]===9)ci.push(i);}
  if(ci.length>=1&&ci.length<=2){for(const i of ci){if(lines[i]?.text)cardDefs.push({label:'触处',body:lines[i].text,italic:false});}}
  if(closing)cardDefs.push({label:'余响',body:closing,italic:true});

  let html='';
  for(const def of cardDefs){html+=`<div class="interp-card"><div class="interp-card-label">${def.label}</div><div class="interp-card-body${def.italic?' italic':''}">${def.body}</div></div>`;}
  interpStage.innerHTML=html;

  let dh='';
  for(let i=0;i<cardDefs.length;i++)dh+=`<div class="interp-dot${i===0?' active':''}"></div>`;
  interpDots.innerHTML=dh;

  activeIdx=0;busy=false;
  layoutCards();
  interpOverlay.classList.add('active');
}

function resetAll(){
  interpOverlay.classList.remove('active');
  interpStage.innerHTML='';interpDots.innerHTML='';
  cardDefs=[];activeIdx=0;
  STATE.salt=null;STATE.hexId=null;STATE.yaoValues=null;STATE.hexData=null;
  collapsePhase=0;pressTriggered=false;
  showWhisper(0);
}

/* ═══════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════ */
document.querySelector('.brand-hint').textContent = 'OpenSee · 已加载';
showWhisper(0);
// Rotate whispers
let whisperCycle = setInterval(() => {
  if (collapsePhase > 0 || interpOverlay.classList.contains('active')) return;
  whisperIdx = (whisperIdx + 1) % whispers.length;
  showWhisper(whisperIdx);
}, 8000);

requestAnimationFrame(animate);
</script>
</body>
</html>
